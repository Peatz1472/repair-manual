<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คู่มืองานซ่อม | Repair Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --bg-card: #ffffff;
    --bg-soft: #ebebe4;
    --ink: #1a1a1a;
    --ink-soft: #5a5a55;
    --ink-muted: #8a8a85;
    --line: #d8d8d0;
    --accent-qw: #d94f2a;
    --accent-wag: #2a5fd9;
    --accent-success: #2d8659;
    --accent-warn: #c79a1f;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
    --radius: 4px;
    --radius-lg: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(217,79,42,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(42,95,217,0.04) 0%, transparent 40%);
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ========= TOPBAR ========= */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--ink); color: var(--bg);
    display: grid; place-items: center;
    font-weight: 700; font-size: 18px;
    border-radius: var(--radius);
    position: relative; overflow: hidden;
  }
  .logo-mark::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.15) 50%);
  }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-text .th { font-weight: 600; font-size: 15px; }
  .logo-text .en { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.05em; text-transform: uppercase; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* search */
  .search-box {
    position: relative; flex: 1; max-width: 420px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 36px 10px 38px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: inherit; font-size: 14px; color: var(--ink);
    transition: border-color 0.15s;
  }
  .search-box input:focus { outline: none; border-color: var(--ink); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; pointer-events: none;
    color: var(--ink-muted);
  }
  .search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px;
    background: var(--ink-muted); color: white;
    border: none; border-radius: 50%; cursor: pointer;
    display: none; place-items: center;
    font-size: 12px; line-height: 1;
  }
  .search-box.has-value .search-clear { display: grid; }

  .btn {
    padding: 8px 14px;
    border: 1px solid var(--line);
    background: var(--bg-card); color: var(--ink);
    border-radius: var(--radius);
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--ink); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-soft); border-color: var(--ink-soft); }
  .btn-danger { color: var(--accent-qw); border-color: var(--accent-qw); }
  .btn-danger:hover { background: var(--accent-qw); color: white; }
  .btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ========= HERO ========= */
  .hero { padding: 32px 0 48px; text-align: center; }
  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700; line-height: 1.15;
    letter-spacing: -0.02em; margin-bottom: 16px;
  }
  .hero h1 .accent {
    background: linear-gradient(120deg, var(--accent-qw), var(--accent-wag));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p { color: var(--ink-soft); max-width: 560px; margin: 0 auto; font-size: 16px; }

  /* ========= BRAND GRID ========= */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px; margin-top: 32px;
  }
  .brand-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 32px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
    text-align: left; font-family: inherit;
  }
  .brand-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--ink);
  }
  .brand-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 4px; background: var(--brand-color, var(--ink));
  }
  .brand-card-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--brand-color); text-transform: uppercase;
    margin-bottom: 12px; font-weight: 600;
  }
  .brand-card h2 {
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 8px; color: var(--ink);
  }
  .brand-card p { color: var(--ink-soft); font-size: 14px; margin-bottom: 20px; }
  .brand-card-stats {
    display: flex; gap: 24px;
    padding-top: 16px; border-top: 1px solid var(--line);
    font-size: 13px;
  }
  .brand-card-stats div { display: flex; flex-direction: column; }
  .brand-card-stats .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 600; color: var(--ink);
  }
  .brand-card-stats .lbl {
    font-size: 11px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* Diagrams quick access */
  .quick-access {
    margin-top: 32px;
    padding: 24px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
  }
  .quick-access h3 {
    font-size: 16px; font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .quick-access-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; }
  .diagram-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .diagram-card {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer; transition: all 0.15s;
  }
  .diagram-card:hover {
    border-color: var(--ink);
    transform: translateY(-1px);
  }
  .diagram-card img { width: 100%; aspect-ratio: 4/3; object-fit: contain; background: white; display: block; }
  .diagram-card-body { padding: 10px 12px; }
  .diagram-card-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .diagram-card-desc { font-size: 11px; color: var(--ink-muted); }

  /* ========= BREADCRUMB ========= */
  .breadcrumb {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin-bottom: 24px;
    font-size: 13px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .breadcrumb a, .breadcrumb span {
    color: var(--ink-soft); cursor: pointer;
    text-decoration: none; transition: color 0.15s;
  }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb .sep { color: var(--ink-muted); user-select: none; }
  .breadcrumb .current { color: var(--ink); font-weight: 600; cursor: default; }

  /* ========= LEVEL HEADER ========= */
  .level-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .level-header-left h2 {
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .level-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .level-tag .dot { width: 6px; height: 6px; background: var(--brand-color, var(--ink)); border-radius: 50%; }

  /* ========= NODE GRID ========= */
  .node-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .node-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer; transition: all 0.15s;
    position: relative; text-align: left;
    display: flex; flex-direction: column; gap: 8px;
    font-family: inherit;
  }
  .node-card:hover {
    border-color: var(--ink);
    transform: translateX(2px);
    box-shadow: var(--shadow-md);
  }
  .node-card .arrow {
    position: absolute; top: 18px; right: 18px;
    color: var(--ink-muted); font-size: 18px;
    transition: transform 0.15s;
  }
  .node-card:hover .arrow { transform: translateX(4px); color: var(--ink); }
  .node-card-title { font-size: 16px; font-weight: 600; padding-right: 24px; line-height: 1.3; }
  .node-card-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
  .node-card-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 8px; padding-top: 10px;
    border-top: 1px dashed var(--line);
    font-size: 11px; color: var(--ink-muted);
  }
  .node-card-meta .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .node-card.is-solution { border-left: 3px solid var(--accent-success); }

  /* ========= SOLUTION ========= */
  .solution {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .solution-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--bg-soft), var(--bg-card));
  }
  .solution-header h2 {
    font-size: 26px; font-weight: 700;
    letter-spacing: -0.015em; margin-bottom: 8px;
  }
  .solution-header p { color: var(--ink-soft); font-size: 15px; }
  .solution-meta {
    display: flex; flex-wrap: wrap; gap: 16px;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px dashed var(--line);
    font-size: 13px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-item .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .meta-item .value { font-weight: 600; color: var(--ink); }
  .solution-body { padding: 28px; }

  .section-block { margin-bottom: 32px; }
  .section-block:last-child { margin-bottom: 0; }
  .section-block h3 {
    font-size: 18px; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-block h3::before {
    content: ''; width: 4px; height: 18px;
    background: var(--brand-color, var(--ink)); border-radius: 2px;
  }

  .symptoms-list, .tools-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--bg-soft);
    padding: 6px 12px; border-radius: 100px;
    font-size: 13px; color: var(--ink);
    border: 1px solid var(--line);
  }

  .step-list { counter-reset: step; list-style: none; }
  .step-list li {
    counter-increment: step; position: relative;
    padding: 16px 16px 16px 56px; margin-bottom: 12px;
    background: var(--bg); border-radius: var(--radius);
    border: 1px solid var(--line); line-height: 1.65;
  }
  .step-list li::before {
    content: counter(step); position: absolute;
    left: 16px; top: 16px;
    width: 28px; height: 28px;
    background: var(--ink); color: var(--bg);
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .image-grid figure {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden; background: var(--bg-soft);
    cursor: pointer; transition: transform 0.15s;
  }
  .image-grid figure:hover {
    transform: scale(1.02);
    box-shadow: var(--shadow-md);
  }
  .image-grid img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: contain; background: white;
    display: block;
  }
  .image-grid figcaption {
    padding: 8px 12px; font-size: 12px;
    color: var(--ink-soft);
    border-top: 1px solid var(--line);
    background: var(--bg-card);
  }

  .img-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background:
      linear-gradient(135deg, var(--bg-soft) 25%, transparent 25%) -10px 0,
      linear-gradient(225deg, var(--bg-soft) 25%, transparent 25%) -10px 0,
      var(--bg);
    background-size: 20px 20px;
    display: grid; place-items: center;
    color: var(--ink-muted); font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .warning-box {
    background: #fff7e6;
    border: 1px solid #f0c674;
    border-left: 3px solid var(--accent-warn);
    padding: 14px 16px; border-radius: var(--radius);
    margin-bottom: 16px; font-size: 14px;
  }
  .warning-box strong {
    display: block; margin-bottom: 4px;
    color: #8a6d1c;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ========= INTERACTIVE DIAGRAM (HOTSPOTS) ========= */
  .diagram-viewer {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .diagram-viewer-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .diagram-viewer-header h2 {
    font-size: 20px; font-weight: 700; margin-bottom: 2px;
  }
  .diagram-viewer-header p { font-size: 13px; color: var(--ink-soft); }

  .diagram-stage {
    position: relative;
    background: linear-gradient(135deg, #fafafa 0%, #f0f0eb 100%);
    display: flex; justify-content: center; align-items: center;
    min-height: 400px;
    padding: 16px;
  }
  .diagram-img-wrap {
    position: relative; display: inline-block;
    max-width: 100%; max-height: 600px;
  }
  .diagram-img-wrap img {
    display: block; max-width: 100%; height: auto;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
  }
  .diagram-img-wrap.editing img { cursor: crosshair; }

  .hotspot {
    position: absolute;
    width: 32px; height: 32px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 5;
  }
  .hotspot-dot {
    position: absolute; inset: 0;
    background: var(--accent-qw);
    border: 3px solid white;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }
  .hotspot-pulse {
    position: absolute; inset: 0;
    background: var(--accent-qw);
    border-radius: 50%;
    opacity: 0.4;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .hotspot:hover .hotspot-dot { transform: scale(1.2); }
  .hotspot-num {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: white; font-weight: 700; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none;
  }
  .hotspot.brand-wag .hotspot-dot,
  .hotspot.brand-wag .hotspot-pulse { background: var(--accent-wag); }

  .hotspot-tooltip {
    position: absolute;
    bottom: 100%; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--ink); color: var(--bg);
    padding: 8px 12px; border-radius: var(--radius);
    font-size: 12px; white-space: nowrap;
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s;
    box-shadow: var(--shadow-md);
    max-width: 240px; white-space: normal;
    z-index: 10;
  }
  .hotspot-tooltip::after {
    content: ''; position: absolute;
    top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
  }
  .hotspot:hover .hotspot-tooltip { opacity: 1; }

  .diagram-hotspot-list {
    padding: 16px 20px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .diagram-hotspot-list h4 {
    font-size: 13px; font-weight: 600;
    margin-bottom: 10px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .hotspot-list-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 6px;
    cursor: pointer; transition: all 0.15s;
    font-size: 13px;
  }
  .hotspot-list-item:hover {
    border-color: var(--ink);
    transform: translateX(2px);
  }
  .hotspot-list-num {
    width: 24px; height: 24px;
    background: var(--accent-qw);
    color: white; border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .hotspot-list-num.brand-wag { background: var(--accent-wag); }
  .hotspot-list-text { flex: 1; }
  .hotspot-list-link {
    font-size: 11px; color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ========= ADMIN ========= */
  .admin-panel {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  .admin-tabs {
    display: flex; gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .admin-tab {
    padding: 10px 16px; background: none; border: none;
    cursor: pointer; font-family: inherit; font-size: 14px;
    color: var(--ink-soft);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-weight: 500;
    white-space: nowrap;
  }
  .admin-tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 600;
  }

  .admin-tree {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    max-height: 600px; overflow-y: auto;
  }
  .tree-node {
    border-left: 1px solid var(--line);
    padding-left: 12px;
    margin-left: 6px; margin-top: 4px;
  }
  .tree-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px;
    border-radius: var(--radius);
    transition: background 0.1s;
  }
  .tree-row:hover { background: var(--bg-soft); }
  .tree-row .toggle {
    width: 18px; height: 18px;
    background: none; border: none; cursor: pointer;
    color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    display: grid; place-items: center;
  }
  .tree-row .name { flex: 1; font-size: 14px; cursor: pointer; }
  .tree-row .actions {
    display: flex; gap: 4px;
    opacity: 0; transition: opacity 0.1s;
  }
  .tree-row:hover .actions { opacity: 1; }
  .tree-row .actions button {
    width: 24px; height: 24px; padding: 0;
    background: none; border: 1px solid var(--line);
    border-radius: 3px; cursor: pointer;
    font-size: 11px;
    display: grid; place-items: center;
    color: var(--ink-soft);
  }
  .tree-row .actions button:hover {

  }

    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);

  .modal.modal-wide { max-width: 1100px; }

  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-footer {

  .form-group { margin-bottom: 16px; }
  .form-group label {

    font-size: 13px; font-weight: 600;
    margin-bottom: 6px; color: var(--ink);

  .form-group textarea,
  .form-group select {

    font-family: inherit; font-size: 14px;
    background: var(--bg-card); color: var(--ink);
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { outline: none; border-color: var(--ink); }
  .form-group textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .form-group textarea.code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; min-height: 200px;
  }

  .image-input-list .img-row {
    display: flex; gap: 8px; margin-bottom: 6px;
  }
  .image-input-list .img-row input { flex: 1; }
  .image-input-list .img-row input:first-child { flex: 0 0 35%; }

  .pill-input {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 6px;
    background: var(--bg-card);
    display: flex; flex-wrap: wrap; gap: 6px;
    min-height: 40px; align-items: center;
  }
  .pill-input input {
    flex: 1; border: none; outline: none;
    padding: 4px 8px;
    font-family: inherit; font-size: 14px;
    background: transparent; min-width: 100px;
  }
  .pill {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 3px 8px 3px 10px;
    border-radius: 100px;
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill button {
    background: none; border: none; cursor: pointer;
    color: var(--ink-muted); font-size: 14px;
    padding: 0; line-height: 1;
    width: 16px; height: 16px;
  }
  .pill button:hover { color: var(--accent-qw); }

  /* file upload zone */
  .upload-zone {
    border: 2px dashed var(--line);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 12px;
  }
  .upload-zone:hover {
    border-color: var(--ink);
    background: var(--bg);
  }
  .upload-zone.drag {
    border-color: var(--accent-success);
    background: #f0f7f3;
  }
  .upload-zone-icon {
    font-size: 24px; margin-bottom: 4px;
    color: var(--ink-muted);
  }
  .upload-zone-text { font-size: 13px; color: var(--ink-soft); }
  .upload-zone-text strong { color: var(--ink); }

  .tabs-inner {
    display: flex; gap: 4px;
    margin-bottom: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 4px;
  }
  .tab-inner {
    flex: 1; padding: 7px 12px;
    background: none; border: none;
    border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 13px;
    color: var(--ink-soft); font-weight: 500;
    transition: all 0.15s;
  }
  .tab-inner.active { background: var(--bg-card); color: var(--ink); box-shadow: var(--shadow-sm); }

  /* ========= TOAST ========= */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: var(--bg);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 14px; z-index: 300;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.2s;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--ink-muted);
  }
  .empty-state h3 {
    color: var(--ink-soft); font-size: 16px;
    margin-bottom: 8px; font-weight: 500;
  }

  /* ========= SEARCH RESULTS ========= */
  .search-results-meta {
    margin-bottom: 12px; font-size: 13px; color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
  }
  .search-results-meta strong { color: var(--ink); }
  .search-section-title {
    font-size: 13px; font-weight: 600;
    margin: 24px 0 8px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .search-section-title:first-child { margin-top: 0; }
  .search-results {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .search-result-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg-soft); }
  .search-result-path {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .search-result-title { font-weight: 600; margin-bottom: 4px; font-size: 15px; }
  .search-result-desc { font-size: 13px; color: var(--ink-soft); }
  .search-result-snippet {
    margin-top: 6px;
    padding: 8px 10px;
    background: var(--bg);
    border-left: 2px solid var(--ink-muted);
    font-size: 12px; color: var(--ink-soft);
    border-radius: 2px;
  }
  .search-result-tags {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .result-tag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: var(--bg-soft); border: 1px solid var(--line);
    padding: 2px 6px; border-radius: 3px;
    color: var(--ink-soft);
  }
  mark {
    background: #ffe8a8; color: var(--ink);
    padding: 0 2px; border-radius: 2px;
  }

  /* ========= LIGHTBOX ========= */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 400;
    display: grid; place-items: center;
    cursor: zoom-out; padding: 24px;
    animation: fadeIn 0.15s;
  }
  .lightbox img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    box-shadow: var(--shadow-lg);
  }

  /* ========= MOBILE ========= */
  @media (max-width: 720px) {
    .topbar-inner { padding: 12px 16px; flex-wrap: wrap; }
    .search-box { width: 100%; order: 3; max-width: 100%; }
    .main { padding: 16px; }
    .hero { padding: 16px 0 32px; }
    .brand-card { padding: 24px; }
    .brand-card h2 { font-size: 26px; }
    .solution-body { padding: 18px; }
    .solution-header { padding: 18px; }
    .level-header h2 { font-size: 22px; }
    .step-list li { padding: 14px 14px 14px 50px; }
    .modal-header, .modal-footer { padding: 14px 16px; }
    .modal-body { padding: 18px; }
    .logo-text .en { display: none; }
    .topbar-actions .btn span { display: none; }
    .hotspot { width: 28px; height: 28px; }
  }

  /* ========= BACK BAR ========= */
  .back-bar {
    margin-bottom: 12px;
  }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-card);
    color: var(--ink-soft);
    padding: 7px 12px;
    border: 1px solid var(--line);
    transition: all 0.15s;
  }
  .btn-back:hover {
    background: var(--ink); color: var(--bg);
    border-color: var(--ink);
    transform: translateX(-2px);
  }

  /* ========= BRAND TABS ========= */
  .brand-tabs {
    display: flex; gap: 4px;
    margin-bottom: 20px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 4px;
    width: fit-content;
    max-width: 100%;
    overflow-x: auto;
  }
  .brand-tab {
    padding: 8px 16px;
    background: none; border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit; font-size: 14px;
    color: var(--ink-soft);
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
    transition: all 0.15s;

  .brand-tab:hover { color: var(--ink); }
  .brand-tab.active {
    background: var(--ink); color: var(--bg);
    font-weight: 600;
  }
  .tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-soft);
    color: var(--ink-soft);
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
  }
  .brand-tab.active .tab-count {
    background: rgba(255,255,255,0.2);
    color: var(--bg);
  }

  /* ========= FILTER PILLS ========= */
  .filter-pills {
    display: flex; gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;

    border-radius: 100px;
    font-family: inherit; font-size: 13px;
    color: var(--ink-soft);

    transition: all 0.15s;

  .filter-pill:hover { border-color: var(--ink); color: var(--ink); }

  .filter-dot {

    border-radius: 50%; display: inline-block;

  .filter-count {

    font-size: 11px;
    background: var(--bg-soft);
    color: var(--ink-soft);

    border-radius: 100px;
    font-weight: 600;

  .filter-pill.active .filter-count {

    padding: 0;
    z-index: 50;
    transform: translate(-50%, -50%);
    transition: transform 0.15s, background 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .diagram-img-wrap.editing .hotspot-delete-btn-overlay {
    display: flex;
  }
  .hotspot-delete-btn-overlay:hover,
  .hotspot-delete-btn-overlay:active {
    background: #b8401e;
    transform: translate(-50%, -50%) scale(1.2);
  }

  /* utilities */
  .stack-sm > * + * { margin-top: 8px; }
  .stack-md > * + * { margin-top: 16px; }

  code {
    background: var(--bg-soft);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
  }
</style>

/* ============== STORAGE ============== */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      // Migrate: brand-level diagrams
      for (const b of data.brands || []) {
        if (!b.diagrams) b.diagrams = [];
      }
      return data;
    }
  } catch (e) { console.error(e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      toast('พื้นที่จัดเก็บเต็ม - ลดขนาดรูป หรือ Export ไฟล์เก็บแทน');
    } else {
      toast('บันทึกข้อมูลไม่สำเร็จ');
    }
  }
}

/* ============== HELPERS ============== */
function findBrand(id) { return appData.brands.find(b => b.id === id); }
function findNodeByPath(brand, path) {
  let nodes = brand.nodes;
  let current = null;
  for (const id of path) {
    current = nodes.find(n => n.id === id);
    if (!current) return null;
    nodes = current.children || [];
  }
  return current;
}
function getNodesAtPath(brand, path) {
  let nodes = brand.nodes;
  for (const id of path) {
    const found = nodes.find(n => n.id === id);
    if (!found) return [];
    nodes = found.children || [];
  }
  return nodes;
}
function isSolutionNode(node) {
  return node && node.solution && (!node.children || node.children.length === 0);
}
function genId(prefix='node') { return prefix + '-' + Math.random().toString(36).slice(2, 8); }
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function toast(msg) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => root.innerHTML = '', 2400);
}

// Find node + brand by node id (for hotspot links)
function findNodeAndBrandById(nodeId) {
  for (const brand of appData.brands) {
    const result = searchInBrand(brand, nodeId);
    if (result) return { brand, ...result };
  }
  return null;
}
function searchInBrand(brand, nodeId, path = []) {
  function walk(nodes, p) {
    for (const n of nodes) {
      const np = [...p, n.id];
      if (n.id === nodeId) return { node: n, path: np };
      if (n.children) {
        const r = walk(n.children, np);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(brand.nodes, path);
}

/* ============== NAVIGATION (with history) ============== */
const historyStack = [];

function pushHistory() {
  // Snapshot current state before changing
  historyStack.push(JSON.parse(JSON.stringify(viewState)));
  if (historyStack.length > 50) historyStack.shift();
}

function goBack() {
  if (historyStack.length === 0) return navigateHome();
  const prev = historyStack.pop();
  viewState = prev;
  // Restore search input value if back to search mode
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.value = prev.mode === 'search' ? prev.searchQuery : '';
    document.getElementById('searchBox').classList.toggle('has-value', !!searchInput.value);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateHome() {
  pushHistory();
  viewState = { mode: 'home', brandId: null, path: [], searchQuery: '', searchBrandFilter: 'all', diagramId: null, brandTab: 'topics' };
  document.getElementById('searchInput').value = '';
  document.getElementById('searchBox').classList.remove('has-value');
  render();
}
function navigateBrand(brandId, path=[]) {
  pushHistory();
  viewState = { mode: 'brand', brandId, path, searchQuery: '', searchBrandFilter: 'all', diagramId: null, brandTab: viewState.brandTab || 'topics' };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateInto(nodeId) {
  pushHistory();
  const brand = findBrand(viewState.brandId);
  if (!brand) return;
  const newPath = [...viewState.path, nodeId];
  const node = findNodeByPath(brand, newPath);
  viewState.mode = isSolutionNode(node) ? 'solution' : 'brand';
  viewState.path = newPath;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateBreadcrumb(level) {
  pushHistory();
  if (level === -1) {
    viewState.mode = 'brand';
    viewState.path = [];
  } else {
    viewState.mode = 'brand';
    viewState.path = viewState.path.slice(0, level+1);
    const brand = findBrand(viewState.brandId);
    const node = findNodeByPath(brand, viewState.path);
    if (isSolutionNode(node)) viewState.mode = 'solution';
    else viewState.path = viewState.path.slice(0, -1);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateDiagram(brandId, diagramId) {
  pushHistory();
  viewState = { mode: 'diagram', brandId, path: [], searchQuery: '', searchBrandFilter: 'all', diagramId, brandTab: 'diagrams' };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateToNode(brandId, path) {
  pushHistory();
  const brand = findBrand(brandId);
  if (!brand) return;
  const node = findNodeByPath(brand, path);
  viewState.mode = isSolutionNode(node) ? 'solution' : 'brand';
  viewState.brandId = brandId;
  viewState.path = path;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchBox').classList.remove('has-value');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchBrandTab(tab) {

}

function setSearchBrandFilter(filter) {

}

function countNodes(brand) {
  let total = 0, solutions = 0;
  function walk(nodes) {
    for (const n of nodes) {
      total++;
      if (isSolutionNode(n)) solutions++;
      if (n.children) walk(n.children);
    }
  }
  walk(brand.nodes);
  return { topCount: brand.nodes.length, solutionCount: solutions, totalCount: total };
}

function searchNodes(query, brandFilter = 'all') {
  const q = query.toLowerCase();
  const results = [];
  function walk(brand, nodes, path = []) {
    for (const n of nodes) {
      const newPath = [...path, n.id];
      const matches = [];
      if (n.title && n.title.toLowerCase().includes(q)) matches.push({ field: 'title', text: n.title });
      if (n.description && n.description.toLowerCase().includes(q)) matches.push({ field: 'description', text: n.description });
      if (n.solution) {
        for (const s of (n.solution.symptoms || [])) {
          if (s.toLowerCase().includes(q)) matches.push({ field: 'symptom', text: s });
        }
        for (const t of (n.solution.tools || [])) {
          if (t.toLowerCase().includes(q)) matches.push({ field: 'tool', text: t });
        }
        for (const s of (n.solution.steps || [])) {
          if (s.toLowerCase().includes(q)) matches.push({ field: 'step', text: s });
        }
        if (n.solution.warning && n.solution.warning.toLowerCase().includes(q)) matches.push({ field: 'warning', text: n.solution.warning });
      }
      if (matches.length > 0) {
        results.push({ brand, node: n, path: newPath, matches });
      }
      if (n.children) walk(brand, n.children, newPath);
    }
  }
  for (const b of appData.brands) {
    if (brandFilter !== 'all' && b.id !== brandFilter) continue;
    walk(b, b.nodes);
  }
  return results;
}

function highlight(text, query) {
  if (!text) return '';
  const escaped = escapeHtml(text);
  if (!query) return escaped;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

  title: 'ชื่อ', description: 'คำอธิบาย', symptom: 'อาการ',

};

  const q = viewState.searchQuery;
  const brandFilter = viewState.searchBrandFilter || 'all';
  const allResults = searchNodes(q, 'all');
  const results = brandFilter === 'all' ? allResults : allResults.filter(r => r.brand.id === brandFilter);

  // Count per brand for filter pills
  const counts = { all: allResults.length };
  for (const b of appData.brands) {
    counts[b.id] = allResults.filter(r => r.brand.id === b.id).length;
  }

  // Group by brand (only when showing all)
  const byBrand = {};
  for (const r of results) {
    const k = r.brand.id;
    if (!byBrand[k]) byBrand[k] = { brand: r.brand, items: [] };
    byBrand[k].items.push(r);
  }

  root.innerHTML = `
    ${renderBackBar(null)}
    <div class="level-header">
      <div class="level-header-left">

      </div>
    </div>

    <div class="filter-pills">
      <button class="filter-pill ${brandFilter === 'all' ? 'active' : ''}" onclick="setSearchBrandFilter('all')">
        ทุกแบรนด์ <span class="filter-count">${counts.all}</span>
      </button>
      ${appData.brands.map(b => `
        <button class="filter-pill ${brandFilter === b.id ? 'active' : ''}" onclick="setSearchBrandFilter('${b.id}')" style="--filter-color: ${b.color};">
          <span class="filter-dot" style="background: ${b.color};"></span>
          ${escapeHtml(b.name)} <span class="filter-count">${counts[b.id] || 0}</span>
        </button>
      `).join('')}
    </div>

    ${results.length === 0
      ? renderEmpty('ไม่พบผลลัพธ์', 'ลองค้นหาด้วยคำอื่น เช่น เลข Error Code (201, 27), ชื่อชิ้นส่วน (เซ็นเซอร์, มอเตอร์), หรืออาการ (timeout, overload)')
      : Object.values(byBrand).map(group => `
        <div class="search-section-title">${escapeHtml(group.brand.name)} · ${escapeHtml(group.brand.fullName)} (${group.items.length})</div>
        <div class="search-results">
          ${group.items.map(r => {
            const pathLabels = [];
            let nodes = r.brand.nodes;
            for (const id of r.path) {
              const found = nodes.find(n => n.id === id);
              if (!found) break;
              pathLabels.push(found.title);
              nodes = found.children || [];
            }
            const nonTitleMatch = r.matches.find(m => m.field !== 'title') || r.matches[0];
            const fieldsHit = [...new Set(r.matches.map(m => m.field))];
            return `
              <div class="search-result-item" onclick="navigateToNode('${r.brand.id}', ${JSON.stringify(r.path).replace(/"/g,'&quot;')})">
                <div class="search-result-path">${escapeHtml(r.brand.name)} / ${pathLabels.slice(0, -1).map(escapeHtml).join(' / ')}</div>
                <div class="search-result-title">${highlight(r.node.title, q)}</div>
                ${r.node.description ? `<div class="search-result-desc">${highlight(r.node.description, q)}</div>` : ''}
                ${nonTitleMatch && nonTitleMatch.field !== 'title' && nonTitleMatch.field !== 'description'
                  ? `<div class="search-result-snippet">${FIELD_LABELS[nonTitleMatch.field]}: ${highlight(nonTitleMatch.text, q)}</div>`
                  : ''}
                <div class="search-result-tags">
                  ${fieldsHit.map(f => `<span class="result-tag">match: ${FIELD_LABELS[f]}</span>`).join('')}
                  ${isSolutionNode(r.node) ? '<span class="result-tag" style="color: var(--accent-success); border-color: var(--accent-success);">solution</span>' : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `).join('')
    }
  `;
}

const treeExpanded = new Set();
function toggleTreeNode(brandId, pathStr) {
  const key = brandId + ':' + pathStr;
  if (treeExpanded.has(key)) treeExpanded.delete(key);
  else treeExpanded.add(key);
  render();
}
function renderAdminTree() {
  return `
    <div class="admin-tree">${appData.brands.map(b => renderTreeBrand(b)).join('')}</div>
    <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="openBrandEdit(null)">+ เพิ่มแบรนด์ใหม่</button>

}
function renderTreeBrand(brand) {
  return `
    <div style="margin-bottom: 16px;">
      <div class="tree-row" style="background: var(--bg-soft); padding: 8px 10px; border-radius: var(--radius);">
        <span style="width: 8px; height: 8px; background: ${brand.color}; border-radius: 50%; display: inline-block;"></span>
        <span class="name" style="font-weight: 700;">${escapeHtml(brand.name)} — ${escapeHtml(brand.fullName)}</span>
        <div class="actions" style="opacity: 1;">
          <button onclick="openNodeEdit('${brand.id}', null, null)" title="เพิ่มหมวดหลัก">+</button>
          <button onclick="openBrandEdit('${brand.id}')" title="แก้ไข">✎</button>
          <button onclick="deleteBrand('${brand.id}')" title="ลบ">×</button>
        </div>
      </div>
      ${brand.nodes.map(n => renderTreeNode(brand.id, n, [])).join('')}
    </div>
  `;
}
function renderTreeNode(brandId, node, parentPath) {
  const path = [...parentPath, node.id];
  const isSol = isSolutionNode(node);
  const hasChildren = node.children && node.children.length > 0;
  const expanded = treeExpanded.has(brandId + ':' + path.join('/'));
  return `
    <div class="tree-node">
      <div class="tree-row ${isSol ? 'is-solution' : ''}">
        ${hasChildren
          ? `<button class="toggle" onclick="toggleTreeNode('${brandId}', '${path.join('/')}'); event.stopPropagation();">${expanded ? '▾' : '▸'}</button>`
          : `<span class="toggle"></span>`}
        <span class="name" onclick="openNodeEdit('${brandId}', '${parentPath.join('/')}', '${node.id}')">${escapeHtml(node.title)}</span>
        <div class="actions">
          ${!isSol ? `<button onclick="openNodeEdit('${brandId}', '${path.join('/')}', null)" title="เพิ่มย่อย">+</button>` : ''}
          <button onclick="openNodeEdit('${brandId}', '${parentPath.join('/')}', '${node.id}')" title="แก้ไข">✎</button>
          <button onclick="deleteNode('${brandId}', '${path.join('/')}')" title="ลบ">×</button>
        </div>
      </div>
      ${expanded && hasChildren ? node.children.map(c => renderTreeNode(brandId, c, path)).join('') : ''}
    </div>
  `;
}

/* === Diagram Edit Modal === */
let diagramEditState = { imageData: '', mode: 'upload' };

function openDiagramEdit(brandId, diagramId) {
  const brand = findBrand(brandId);
  if (!brand) { toast('ไม่พบแบรนด์'); return; }
  if (!brand.diagrams) brand.diagrams = [];

  const isNew = !diagramId;
  const d = isNew
    ? { id: genId('diag'), title: '', description: '', image: '', hotspots: [] }
    : brand.diagrams.find(x => x.id === diagramId);
  if (!d) return;

  diagramEditState = { imageData: d.image || '', mode: d.image ? 'preview' : 'upload', brandId };

  showModal({
    title: isNew ? `เพิ่มไดอะแกรมใน ${brand.name}` : `แก้ไข: ${d.title}`,
    body: `
      <div class="form-group">
        <label>ชื่อไดอะแกรม</label>
        <input id="df-title" value="${escapeHtml(d.title)}" placeholder="เช่น แปรงด้านบน + เซ็นเซอร์ลิมิต">
      </div>
      <div class="form-group">
        <label>คำอธิบาย</label>
        <textarea id="df-desc" style="min-height: 60px;">${escapeHtml(d.description || '')}</textarea>
      </div>
      <div class="form-group">
        <label>รูปไดอะแกรม</label>
        <div class="tabs-inner">
          <button class="tab-inner ${diagramEditState.mode === 'upload' ? 'active' : ''}" onclick="switchDiagramMode('upload')">📤 อัพโหลดจากเครื่อง</button>
          <button class="tab-inner ${diagramEditState.mode === 'url' ? 'active' : ''}" onclick="switchDiagramMode('url')">🔗 URL</button>
          ${diagramEditState.imageData ? `<button class="tab-inner ${diagramEditState.mode === 'preview' ? 'active' : ''}" onclick="switchDiagramMode('preview')">👁 ดูรูป</button>` : ''}
        </div>
        <div id="diagramImageInput">${renderDiagramImageInput()}</div>
      </div>
    `,
    onSave: () => {
      const title = document.getElementById('df-title').value.trim();
      if (!title) { toast('กรุณาใส่ชื่อ'); return false; }
      if (!diagramEditState.imageData) { toast('กรุณาเพิ่มรูป'); return false; }

      const data = {
        id: d.id,
        title,
        description: document.getElementById('df-desc').value.trim(),
        image: diagramEditState.imageData,
        hotspots: d.hotspots || []
      };

      if (isNew) {
        brand.diagrams.push(data);
      } else {
        const idx = brand.diagrams.findIndex(x => x.id === d.id);
        if (idx >= 0) brand.diagrams[idx] = data;
      }
      saveData();
      toast(isNew ? 'เพิ่มแล้ว' : 'บันทึกแล้ว');
      render();
      return true;
    }
  });
}

function switchDiagramMode(mode) {
  diagramEditState.mode = mode;
  document.getElementById('diagramImageInput').innerHTML = renderDiagramImageInput();
}

function renderDiagramImageInput() {
  if (diagramEditState.mode === 'upload') {
    return `
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">📤</div>
        <div class="upload-zone-text"><strong>คลิก</strong> หรือ <strong>ลากรูป</strong>มาวางที่นี่<br><small>รองรับ JPG, PNG, GIF, WebP (แนะนำไม่เกิน 1 MB)</small></div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
      </div>
      ${diagramEditState.imageData ? `<img src="${diagramEditState.imageData}" style="max-width: 100%; border-radius: var(--radius); border: 1px solid var(--line); margin-top: 8px;">` : ''}
    `;
  }
  if (diagramEditState.mode === 'url') {
    return `
      <input type="text" id="urlInput" placeholder="https://..." value="${diagramEditState.imageData && diagramEditState.imageData.startsWith('http') ? escapeHtml(diagramEditState.imageData) : ''}" oninput="diagramEditState.imageData = this.value">
      <p style="font-size: 12px; color: var(--ink-muted); margin-top: 6px;">URL ของรูปจากอินเตอร์เน็ต — รูปจะโหลดทุกครั้งที่เปิด</p>
    `;
  }
  // preview
  return diagramEditState.imageData
    ? `<img src="${diagramEditState.imageData}" style="max-width: 100%; border-radius: var(--radius); border: 1px solid var(--line);">`
    : '<p style="color: var(--ink-muted);">ยังไม่มีรูป</p>';
}

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    if (!confirm(`ไฟล์ขนาด ${(file.size/1024/1024).toFixed(1)} MB ใหญ่ - อาจทำให้ localStorage เต็ม\nต้องการดำเนินการต่อหรือไม่?`)) return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    diagramEditState.imageData = ev.target.result;
    document.getElementById('diagramImageInput').innerHTML = renderDiagramImageInput();
    toast('โหลดรูปแล้ว');
  };
  reader.readAsDataURL(file);
}

function deleteDiagram(brandId, diagramId) {
  if (!confirm('ลบไดอะแกรมนี้พร้อม Hotspot ทั้งหมด?')) return;
  const brand = findBrand(brandId);
  if (!brand) return;
  brand.diagrams = (brand.diagrams || []).filter(d => d.id !== diagramId);
  saveData();
  toast('ลบแล้ว');
  render();
}

  hotspotEditState = { brandId, diagramId, editingIdx: null, isDragging: false };
  renderHotspotEditor();
}

function getEditingDiagram() {
  const brand = findBrand(hotspotEditState.brandId);
  if (!brand) return null;
  return (brand.diagrams || []).find(x => x.id === hotspotEditState.diagramId);
}

function renderHotspotEditor() {
  const d = getEditingDiagram();
  if (!d) { closeModal(); return; }
  const brand = findBrand(hotspotEditState.brandId);

  // Build select options of all leaf nodes

  for (const b of appData.brands) {
    function walk(nodes, ancestors = []) {
      for (const n of nodes) {
        const path = [...ancestors, n.title];
        if (isSolutionNode(n)) {
          allNodes.push({ id: n.id, brand: b.name, label: b.name + ' / ' + path.join(' / ') });

                    <button class="btn btn-sm btn-danger" onclick="removeHotspot(${i}, event)" onmousedown="event.stopPropagation()" style="padding: 3px 7px; flex-shrink: 0;" title="ลบจุดนี้">× ลบ</button>
                  </div>
                  <select style="width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid var(--line); border-radius: var(--radius);" onchange="updateHotspotField(${i}, 'linkNodeId', this.value)">
                    <option value="">— ยังไม่ได้เลือก —</option>
                    ${allNodes.map(n => `<option value="${n.id}" ${h.linkNodeId === n.id ? 'selected' : ''}>${escapeHtml(n.label)}</option>`).join('')}
                  </select>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `,
    onSave: () => {
      saveData();
      toast(`บันทึก ${(d.hotspots || []).length} Hotspot แล้ว`);
      render();
      return true;
    },
    saveLabel: 'เสร็จสิ้น'
  });
}

function refreshHotspotMarkers() {
  // Highlight the currently editing marker
  const wrap = document.getElementById('editorImgWrap');
  if (!wrap) return;
  const markers = wrap.querySelectorAll('.hotspot');
  markers.forEach((m, i) => {
    m.classList.toggle('editing-active', i === hotspotEditState.editingIdx);
  });
}

function handleDiagramClick(event) {
  if (hotspotEditState.isDragging) {
    hotspotEditState.isDragging = false;
    return;
  }
  const img = document.getElementById('editorImg');
  const rect = img.getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 100;
  const y = ((event.clientY - rect.top) / rect.height) * 100;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;

  const d = getEditingDiagram();
  if (!d) return;
  if (!d.hotspots) d.hotspots = [];
  d.hotspots.push({ x: Math.round(x*10)/10, y: Math.round(y*10)/10, label: '', linkNodeId: '' });
  hotspotEditState.editingIdx = d.hotspots.length - 1;
  renderHotspotEditor();
}

function startDragHotspot(event, idx) {
  event.preventDefault();
  event.stopPropagation();
  hotspotEditState.editingIdx = idx;
  hotspotEditState.isDragging = false;
  let dragStarted = false;

  const img = document.getElementById('editorImg');
  const rect = img.getBoundingClientRect();

  const moveHandler = (e) => {
    const evt = e.touches ? e.touches[0] : e;
    const x = ((evt.clientX - rect.left) / rect.width) * 100;
    const y = ((evt.clientY - rect.top) / rect.height) * 100;
    if (x < 0 || x > 100 || y < 0 || y > 100) return;
    if (!dragStarted) { dragStarted = true; hotspotEditState.isDragging = true; }
    const d = getEditingDiagram();
    if (!d || !d.hotspots[idx]) return;
    d.hotspots[idx].x = Math.round(x * 10) / 10;
    d.hotspots[idx].y = Math.round(y * 10) / 10;
    // Move just the dot for performance
    const wrap = document.getElementById('editorImgWrap');
    const markers = wrap.querySelectorAll('.hotspot');
    if (markers[idx]) {
      markers[idx].style.left = d.hotspots[idx].x + '%';
      markers[idx].style.top = d.hotspots[idx].y + '%';
    }
  };
  const upHandler = () => {
    document.removeEventListener('mousemove', moveHandler);
    document.removeEventListener('mouseup', upHandler);
    document.removeEventListener('touchmove', moveHandler);
    document.removeEventListener('touchend', upHandler);
    setTimeout(() => { hotspotEditState.isDragging = false; }, 50);
  };
  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', upHandler);
  document.addEventListener('touchmove', moveHandler, { passive: false });
  document.addEventListener('touchend', upHandler);
}

function editHotspot(idx) {
  hotspotEditState.editingIdx = idx;
  refreshHotspotMarkers();
  // Scroll to the corresponding form item
  const items = document.querySelectorAll('.hotspot-edit-item');
  if (items[idx]) {
    items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    const input = items[idx].querySelector('input');
    if (input) input.focus();
  }
}

function updateHotspotField(idx, field, value) {
  const d = getEditingDiagram();
  if (!d || !d.hotspots[idx]) return;
  d.hotspots[idx][field] = value;
  // Auto-save on each edit so changes persist
  saveData();
}

function removeHotspot(idx, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  if (!confirm(`ลบจุดที่ ${idx+1} ใช่ไหม?`)) return;
  const d = getEditingDiagram();
  if (!d || !d.hotspots) return;
  d.hotspots.splice(idx, 1);
  hotspotEditState.editingIdx = null;
  // Save immediately so deletion persists even if user closes modal
  saveData();
  renderHotspotEditor();
}

/* === Brand Edit === */
function openBrandEdit(brandId) {
  const brand = brandId ? findBrand(brandId) : { id:'', name:'', fullName:'', description:'', color:'#666666', nodes:[] };
  const isNew = !brandId;
  showModal({
    title: isNew ? 'เพิ่มแบรนด์ใหม่' : `แก้ไขแบรนด์: ${brand.name}`,
    body: `
      <div class="form-group">
        <label>รหัส (ID)<span class="hint">ภาษาอังกฤษตัวเล็ก</span></label>
        <input id="bf-id" value="${escapeHtml(brand.id)}" ${!isNew ? 'readonly' : ''} placeholder="เช่น qw">
      </div>
      <div class="form-group"><label>ชื่อย่อ</label><input id="bf-name" value="${escapeHtml(brand.name)}" placeholder="QW"></div>
      <div class="form-group"><label>ชื่อเต็ม</label><input id="bf-full" value="${escapeHtml(brand.fullName)}" placeholder="แบรนด์ QW"></div>
      <div class="form-group"><label>คำอธิบาย</label><textarea id="bf-desc">${escapeHtml(brand.description)}</textarea></div>
      <div class="form-group"><label>สีหลัก</label><input id="bf-color" type="color" value="${escapeHtml(brand.color || '#666666')}" style="height: 40px; padding: 4px;"></div>
    `,
    onSave: () => {
      const id = document.getElementById('bf-id').value.trim();
      if (!id) { toast('กรุณาใส่รหัส'); return false; }
      if (isNew && findBrand(id)) { toast('รหัสซ้ำ'); return false; }
      const data = {
        id,
        name: document.getElementById('bf-name').value.trim(),
        fullName: document.getElementById('bf-full').value.trim(),
        description: document.getElementById('bf-desc').value.trim(),
        color: document.getElementById('bf-color').value
      };
      if (isNew) appData.brands.push({ ...data, nodes: [] });
      else Object.assign(findBrand(id), data);
      saveData();
      toast(isNew ? 'เพิ่มแล้ว' : 'บันทึกแล้ว');
      render();
      return true;
    }
  });
}
function deleteBrand(brandId) {
  if (!confirm(`ลบแบรนด์ ${brandId} และข้อมูลทั้งหมด?`)) return;
  appData.brands = appData.brands.filter(b => b.id !== brandId);
  saveData(); toast('ลบแล้ว'); render();
}

/* === Node Edit === */
let editFormState = { symptoms: [], tools: [], steps: [], images: [] };

function openNodeEdit(brandId, parentPathStr, nodeId) {
  const brand = findBrand(brandId);
  if (!brand) return;
  const parentPath = parentPathStr ? parentPathStr.split('/').filter(Boolean) : [];
  let node, isNew = false;
  if (nodeId) node = findNodeByPath(brand, [...parentPath, nodeId]);
  else { isNew = true; node = { id: genId(), title: '', description: '', children: [] }; }
  if (!node) return;

  editFormState = {
    symptoms: node.solution ? [...(node.solution.symptoms || [])] : [],
    tools: node.solution ? [...(node.solution.tools || [])] : [],
    steps: node.solution ? [...(node.solution.steps || [])] : [],
    images: node.solution ? [...(node.solution.images || [])] : []
  };

  const hasSolution = !!node.solution;
  const hasChildren = node.children && node.children.length > 0;

  showModal({
    title: isNew ? 'เพิ่มรายการใหม่' : `แก้ไข: ${node.title}`,
    body: `
      <div class="form-group"><label>ชื่อรายการ</label><input id="nf-title" value="${escapeHtml(node.title)}" placeholder="เช่น 201 - เซ็นเซอร์ลิมิต..."></div>
      <div class="form-group"><label>คำอธิบายสั้น</label><textarea id="nf-desc" style="min-height: 60px;">${escapeHtml(node.description || '')}</textarea></div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="nf-issolution" ${hasSolution ? 'checked' : ''} ${hasChildren ? 'disabled' : ''} onchange="toggleSolutionFields()">
          เป็นรายการวิธีแก้ปัญหา (Solution Leaf)
          ${hasChildren ? '<span class="hint">— ลบรายการย่อยก่อน</span>' : ''}
        </label>
      </div>
      <div id="solutionFields" style="${hasSolution ? '' : 'display:none;'} background: var(--bg); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line);">
        <div class="form-group">
          <label>ระดับความยาก</label>
          <select id="nf-difficulty">
            <option value="">— เลือก —</option>
            ${['ง่าย','ปานกลาง','ยาก'].map(d => `<option value="${d}" ${node.solution?.difficulty === d ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>เวลาที่ใช้</label><input id="nf-time" value="${escapeHtml(node.solution?.estimatedTime || '')}" placeholder="30 นาที"></div>
        <div class="form-group"><label>ข้อควรระวัง</label><textarea id="nf-warning" style="min-height: 50px;">${escapeHtml(node.solution?.warning || '')}</textarea></div>
        <div class="form-group">
          <label>อาการที่พบ <span class="hint">— Enter เพื่อเพิ่ม</span></label>
          <div class="pill-input" id="pill-symptoms">
            ${editFormState.symptoms.map((s, i) => pillHtml(s, 'symptoms', i)).join('')}
            <input type="text" placeholder="พิมพ์อาการ" onkeydown="addPillOnEnter(event, 'symptoms')">
          </div>
        </div>
        <div class="form-group">
          <label>เครื่องมือที่ใช้</label>
          <div class="pill-input" id="pill-tools">
            ${editFormState.tools.map((s, i) => pillHtml(s, 'tools', i)).join('')}
            <input type="text" placeholder="พิมพ์เครื่องมือ" onkeydown="addPillOnEnter(event, 'tools')">
          </div>
        </div>
        <div class="form-group">
          <label>ขั้นตอน</label>
          <div id="steps-list">${editFormState.steps.map((s, i) => stepRowHtml(s, i)).join('')}</div>
          <button class="btn" onclick="addStep()" style="margin-top: 8px;">+ เพิ่มขั้นตอน</button>
        </div>
        <div class="form-group">
          <label>รูปภาพ</label>
          <div id="images-list" class="image-input-list">${editFormState.images.map((img, i) => imageRowHtml(img, i)).join('')}</div>
          <button class="btn" onclick="addImage()" style="margin-top: 8px;">+ เพิ่มรูป</button>
        </div>
      </div>
    `,
    onSave: () => {
      const title = document.getElementById('nf-title').value.trim();
      if (!title) { toast('กรุณาใส่ชื่อ'); return false; }
      const description = document.getElementById('nf-desc').value.trim();
      const isSol = document.getElementById('nf-issolution').checked;
      const updated = { id: node.id, title, description };
      if (isSol) {
        updated.solution = {
          difficulty: document.getElementById('nf-difficulty').value,
          estimatedTime: document.getElementById('nf-time').value.trim(),
          warning: document.getElementById('nf-warning').value.trim(),
          symptoms: [...editFormState.symptoms],
          tools: [...editFormState.tools],
          steps: [...editFormState.steps],
          images: [...editFormState.images]
        };
      } else {
        updated.children = node.children || [];
      }
      if (isNew) {
        if (parentPath.length === 0) brand.nodes.push(updated);
        else {
          const parent = findNodeByPath(brand, parentPath);
          if (!parent.children) parent.children = [];
          parent.children.push(updated);
        }
      } else {
        Object.keys(node).forEach(k => delete node[k]);
        Object.assign(node, updated);
      }
      saveData(); toast(isNew ? 'เพิ่มแล้ว' : 'บันทึกแล้ว'); render();
      return true;
    }
  });
}

function pillHtml(text, key, idx) {
  return `<span class="pill">${escapeHtml(text)}<button onclick="removePill('${key}', ${idx})">×</button></span>`;
}
function addPillOnEnter(e, key) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  if (!val) return;
  editFormState[key].push(val);
  e.target.value = '';
  refreshPills(key);
}
function removePill(key, idx) {
  editFormState[key].splice(idx, 1);
  refreshPills(key);
}
function refreshPills(key) {
  const container = document.getElementById('pill-' + key);
  container.innerHTML = editFormState[key].map((s, i) => pillHtml(s, key, i)).join('') +
    `<input type="text" placeholder="พิมพ์แล้วกด Enter" onkeydown="addPillOnEnter(event, '${key}')">`;
  container.querySelector('input').focus();
}
function stepRowHtml(text, i) {
  return `<div class="img-row" style="display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start;">
    <span style="width: 28px; height: 32px; display: grid; place-items: center; background: var(--ink); color: var(--bg); border-radius: var(--radius); font-family: 'JetBrains Mono', monospace; font-size: 12px; flex-shrink: 0;">${i+1}</span>
    <textarea style="flex: 1; min-height: 38px; padding: 8px;" oninput="editFormState.steps[${i}] = this.value">${escapeHtml(text)}</textarea>
    <button class="btn btn-icon" onclick="removeStep(${i})">×</button>
  </div>`;
}
function addStep() { editFormState.steps.push(''); document.getElementById('steps-list').innerHTML = editFormState.steps.map((s, i) => stepRowHtml(s, i)).join(''); }
function removeStep(i) { editFormState.steps.splice(i, 1); document.getElementById('steps-list').innerHTML = editFormState.steps.map((s, i) => stepRowHtml(s, i)).join(''); }

function imageRowHtml(img, i) {
  return `<div class="img-row">
    <input type="text" placeholder="URL รูป" value="${escapeHtml(img.url || '')}" oninput="editFormState.images[${i}].url = this.value">
    <input type="text" placeholder="คำบรรยาย" value="${escapeHtml(img.caption || '')}" oninput="editFormState.images[${i}].caption = this.value">
    <button class="btn btn-icon" onclick="removeImage(${i})">×</button>
  </div>`;
}
function addImage() { editFormState.images.push({url:'', caption:''}); document.getElementById('images-list').innerHTML = editFormState.images.map((img, i) => imageRowHtml(img, i)).join(''); }
function removeImage(i) { editFormState.images.splice(i, 1); document.getElementById('images-list').innerHTML = editFormState.images.map((img, i) => imageRowHtml(img, i)).join(''); }
function toggleSolutionFields() { document.getElementById('solutionFields').style.display = document.getElementById('nf-issolution').checked ? '' : 'none'; }

function deleteNode(brandId, pathStr) {
  if (!confirm('ลบรายการนี้และรายการย่อย?')) return;
  const brand = findBrand(brandId);
  const path = pathStr.split('/').filter(Boolean);
  const targetId = path[path.length-1];
  const parentPath = path.slice(0,-1);
  if (parentPath.length === 0) brand.nodes = brand.nodes.filter(n => n.id !== targetId);
  else {
    const parent = findNodeByPath(brand, parentPath);
    if (parent && parent.children) parent.children = parent.children.filter(n => n.id !== targetId);
  }
  saveData(); toast('ลบแล้ว'); render();
}


/* === Admin JSON === */
function renderAdminJSON() {
  return `
    <div class="form-group">
      <label>ข้อมูลทั้งหมด (JSON)</label>
      <textarea id="jsonData" class="code">${escapeHtml(JSON.stringify(appData, null, 2))}</textarea>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="importJSON()">⬇ Import JSON</button>
      <button class="btn" onclick="exportJSON()">⬆ ดาวน์โหลด</button>
      <button class="btn" onclick="copyJSON()">⧉ Copy</button>
    </div>
    <p style="margin-top: 16px; font-size: 13px; color: var(--ink-soft);">
      💡 ขนาดไฟล์ปัจจุบัน: ${(JSON.stringify(appData).length/1024).toFixed(0)} KB
    </p>
  `;
}
function importJSON() {
  try {
    const text = document.getElementById('jsonData').value;
    const parsed = JSON.parse(text);
    if (!parsed.brands || !Array.isArray(parsed.brands)) throw new Error('ต้องมี brands array');
    // Migrate: if data has top-level diagrams, distribute to first brand
    if (parsed.diagrams && parsed.diagrams.length > 0 && parsed.brands.length > 0) {
      if (!parsed.brands[1].diagrams) parsed.brands[1].diagrams = parsed.diagrams;
      delete parsed.diagrams;
    }
    for (const b of parsed.brands) if (!b.diagrams) b.diagrams = [];
    appData = parsed;
    saveData();
    toast('Import สำเร็จ'); render();
  } catch (e) { toast('Import ไม่สำเร็จ: ' + e.message); }
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `repair-manual-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ดาวน์โหลดแล้ว');
}
function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(appData, null, 2))
    .then(() => toast('Copy แล้ว'))
    .catch(() => toast('Copy ไม่สำเร็จ'));
}


function renderAdminReset() {
  let defaultDiagrams = 0, currentDiagrams = 0;
  function count(nodes) {
    let n = 0;
    for (const node of nodes) { n++; if (node.children) n += count(node.children); }
    return n;
  }
  for (const b of DEFAULT_DATA.brands) {
    defaultCount += count(b.nodes);
    defaultDiagrams += (b.diagrams || []).length;
  }
  for (const b of appData.brands) {
    currentCount += count(b.nodes);
    currentDiagrams += (b.diagrams || []).length;
  }

  return `
    <div style="display: grid; gap: 16px;">
      <div style="background: var(--bg); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line);">
        <h4 style="font-size: 15px; font-weight: 600; margin-bottom: 8px;">📊 สถานะปัจจุบัน</h4>
        <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 4px;">ข้อมูลในเครื่อง: <strong style="color: var(--ink);">${currentCount}</strong> รายการ · <strong style="color: var(--ink);">${currentDiagrams}</strong> ไดอะแกรม</p>
        <p style="font-size: 13px; color: var(--ink-soft);">ข้อมูลตัวอย่าง: <strong style="color: var(--ink);">${defaultCount}</strong> รายการ · <strong style="color: var(--ink);">${defaultDiagrams}</strong> ไดอะแกรม</p>
      </div>
      <div style="background: var(--bg-card); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line);">
        <h4 style="font-size: 15px; font-weight: 600; margin-bottom: 8px;">🔄 โหลดข้อมูลตัวอย่างใหม่ทับ</h4>
        <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 12px;">แทนที่ข้อมูลทั้งหมดด้วยตัวอย่างเริ่มต้นที่ฝังในเว็บ</p>
        <button class="btn btn-primary" onclick="resetData()">โหลดข้อมูลตัวอย่างใหม่ทับ</button>
      </div>
      <div class="warning-box">
        <strong>⚠ คำเตือน</strong>
        จะลบข้อมูลทุกอย่างที่คุณแก้ไขในเครื่องนี้
        <br><br>💡 แนะนำ Export JSON เก็บไว้ก่อน
      </div>
    </div>
  `;
}
function resetData() {
  if (!confirm('แน่ใจที่จะโหลดข้อมูลใหม่ทับ?\nข้อมูลที่คุณเพิ่มเองจะหายไป!')) return;
  appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(); toast('โหลดใหม่เรียบร้อย'); render();
}

/* ============== MODAL ============== */
let modalSaveCallback = null;
function showModal({ title, body, onSave, wide, saveLabel }) {
  modalSaveCallback = onSave;
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
      <div class="modal ${wide ? 'modal-wide' : ''}">
        <div class="modal-header">
          <h3>${escapeHtml(title)}</h3>
          <button class="btn btn-icon" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="modalSave()">${escapeHtml(saveLabel || 'บันทึก')}</button>
        </div>
      </div>
    </div>
  `;
}
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; modalSaveCallback = null; }
function modalSave() {
  if (modalSaveCallback) {
    const ok = modalSaveCallback();
    if (ok !== false) closeModal();
  } else closeModal();
}

/* ============== INIT ============== */
render();

// Drag-drop on upload zone
document.addEventListener('dragover', (e) => {
  const z = document.getElementById('uploadZone');
  if (z && z.contains(e.target)) { e.preventDefault(); z.classList.add('drag'); }
});
document.addEventListener('dragleave', (e) => {
  const z = document.getElementById('uploadZone');
  if (z) z.classList.remove('drag');
});
document.addEventListener('drop', (e) => {
  const z = document.getElementById('uploadZone');
  if (z && z.contains(e.target)) {
    e.preventDefault();
    z.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        diagramEditState.imageData = ev.target.result;
        document.getElementById('diagramImageInput').innerHTML = renderDiagramImageInput();
        toast('โหลดรูปแล้ว');
      };
      reader.readAsDataURL(file);
    }
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeLightbox(); }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});
