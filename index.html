    box-shadow: var(--shadow-lg);
    animation: toastIn 0.2s;
  }

  /* ========= LIGHTBOX ========= */

  /* ========= MOBILE ========= */

  /* utilities */

</style>

<script>
/* ============== DATA ============== */
const STORAGE_KEY = 'repairManualData_v8';
const DATA_URL = 'data.json';
const GITHUB_REPO = 'Peatz1472/repair-manual';   // owner/repo
const GITHUB_BRANCH = 'main';
const GITHUB_DATA_PATH = 'data.json';
const GH_TOKEN_KEY = 'github_pat_v1';
const DATA_DIRTY_KEY = 'dataDirty';   // '1' when local edits not yet published

let DEFAULT_DATA = { brands: [], branding: {} };
let appData = { brands: [], branding: {} };
let DATA_LOADED = false;

/* ========= SKILL LEVEL & PREFERENCES ========= */
const SKILL_KEY = 'repairManualSkill';
const DENSITY_KEY = 'repairManualDensity';
const SORT_KEY = 'repairManualSort';
const DIFFICULTY_KEY = 'repairManualDifficultyFilter';

const SKILL_LEVELS = {
  beginner:   { icon: '🌱', label: 'เริ่มต้น',     bodyClass: 'skill-beginner',   defaultDensity: 'roomy',  defaultSolutionView: 'stepper' },
  technician: { icon: '🔧', label: 'ช่าง',         bodyClass: 'skill-technician', defaultDensity: 'comfortable', defaultSolutionView: undefined },
  expert:     { icon: '⚡', label: 'ผู้เชี่ยวชาญ', bodyClass: 'skill-expert',     defaultDensity: 'compact', defaultSolutionView: 'full' }
};

function getSkillLevel() {
  return localStorage.getItem(SKILL_KEY) || 'technician';
}
function setSkillLevel(level) {
  if (!SKILL_LEVELS[level]) return;
  localStorage.setItem(SKILL_KEY, level);
  applySkillLevel();
  closeSkillMenu();
  // Auto-set density to match skill default unless user has overridden
  const userOverride = localStorage.getItem(DENSITY_KEY + '_override');
  if (!userOverride) {
    localStorage.setItem(DENSITY_KEY, SKILL_LEVELS[level].defaultDensity);
  }
  toast(`เปลี่ยนโหมดเป็น ${SKILL_LEVELS[level].icon} ${SKILL_LEVELS[level].label}`);
  render();
}
function applySkillLevel() {
  const level = getSkillLevel();
  const cfg = SKILL_LEVELS[level];
  document.body.classList.remove('skill-beginner', 'skill-technician', 'skill-expert');
  document.body.classList.add(cfg.bodyClass);
  const iconEl = document.getElementById('skillPickerIcon');
  const labelEl = document.getElementById('skillPickerLabel');
  if (iconEl) iconEl.textContent = cfg.icon;
  if (labelEl) labelEl.textContent = cfg.label;
  document.querySelectorAll('.skill-option').forEach(el => {
    el.classList.toggle('active', el.dataset.skill === level);
  });
}
function toggleSkillMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('skillPickerMenu');
  if (!menu) return;
  menu.classList.toggle('open');
}
function closeSkillMenu() {
  const menu = document.getElementById('skillPickerMenu');
  if (menu) menu.classList.remove('open');
}
document.addEventListener('click', (e) => {
  const picker = document.getElementById('skillPicker');
  if (picker && !picker.contains(e.target)) closeSkillMenu();
});

function getDensity() {
  return localStorage.getItem(DENSITY_KEY) || SKILL_LEVELS[getSkillLevel()].defaultDensity || 'comfortable';
}
function setDensity(d) {
  localStorage.setItem(DENSITY_KEY, d);
  localStorage.setItem(DENSITY_KEY + '_override', '1');
  render();
}
function getSort() { return localStorage.getItem(SORT_KEY) || 'default'; }
function setSort(s) { localStorage.setItem(SORT_KEY, s); render(); }
function getDifficultyFilter() { return localStorage.getItem(DIFFICULTY_KEY) || 'all'; }
function setDifficultyFilter(d) {
  localStorage.setItem(DIFFICULTY_KEY, d === getDifficultyFilter() ? 'all' : d);
  render();
}

let viewState = {
  mode: 'home',
  brandId: null,
  path: [],
  searchQuery: '',
  searchBrandFilter: 'all',  // all | qw | wag
  diagramId: null,
  brandTab: 'cm'  // topics | diagrams (when in brand view at top level)
};

/* ============== STORAGE ============== */
async function fetchRemoteData() {
  // Bust cache so admin sees latest right after publish
  const url = DATA_URL + '?v=' + Date.now();
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  for (const b of data.brands || []) { if (!b.diagrams) b.diagrams = []; }
  return data;
}

function loadData() {
  // Prefer local edits if dirty (admin has unpublished work) OR offline fallback
  const dirty = localStorage.getItem(DATA_DIRTY_KEY) === '1';
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw && (dirty || !DATA_LOADED)) {
      const data = JSON.parse(raw);
      for (const b of data.brands || []) { if (!b.diagrams) b.diagrams = []; }
      return data;
    }
  } catch (e) { console.error(e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

async function initData() {
  // 1) Try fetching authoritative data.json
  try {
    DEFAULT_DATA = await fetchRemoteData();
    DATA_LOADED = true;
  } catch (e) {
    console.warn('Could not fetch data.json — using last cached/empty.', e);
  }
  // 2) Decide what to display
  appData = loadData();
}
function saveData() {
  try {
    if (!appData.branding) appData.branding = {};
    appData.branding.lastUpdated = new Date().toISOString().slice(0, 10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    localStorage.setItem(DATA_DIRTY_KEY, '1');
    localStorage.setItem('hasUnpublishedChanges', 'true');
    updatePublishButton();
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      toast('พื้นที่จัดเก็บเต็ม - ลดขนาดรูป หรือ Export ไฟล์เก็บแทน');
    } else {
      toast('บันทึกข้อมูลไม่สำเร็จ');
    }
  }
}

/* ============== GITHUB PUBLISHING ============== */
function getGhToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function setGhToken(t) {
  if (t) localStorage.setItem(GH_TOKEN_KEY, t);
  else localStorage.removeItem(GH_TOKEN_KEY);
}

async function ghGetFileSha() {
  const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_DATA_PATH}?ref=${GITHUB_BRANCH}`;
  const resp = await fetch(url, {
    headers: {
      'Authorization': 'token ' + getGhToken(),
      'Accept': 'application/vnd.github+json'
    }
  });
  if (resp.status === 404) return null;
  if (!resp.ok) throw new Error('GitHub GET failed: ' + resp.status);
  const j = await resp.json();
  return j.sha;
}

// UTF-8 safe base64 encode (handles Thai characters)
function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

async function publishToGithub() {
  const token = getGhToken();
  if (!token) { showGithubSetup(); return; }
  if (!confirm('ยืนยัน Publish ข้อมูลปัจจุบันขึ้น GitHub?\n\nคนอื่นจะเห็นการเปลี่ยนแปลงใน 30 วินาที - 2 นาที')) return;

  const btn = document.getElementById('publishBtn');
  const original = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ กำลัง Publish...'; }

  try {
    const sha = await ghGetFileSha();
    const content = JSON.stringify(appData, null, 2);
    const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_DATA_PATH}`;
    const body = {
      message: `Update data via admin (${new Date().toISOString().slice(0,16).replace('T',' ')})`,
      content: utf8ToBase64(content),
      branch: GITHUB_BRANCH,
      ...(sha ? { sha } : {})
    };
    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || ('HTTP ' + resp.status));
    }
    localStorage.removeItem(DATA_DIRTY_KEY);
    localStorage.removeItem('hasUnpublishedChanges');
    sessionStorage.removeItem('publishBannerDismissed');
    DEFAULT_DATA = JSON.parse(JSON.stringify(appData));
    DATA_LOADED = true;
    toast('🚀 Publish สำเร็จ — รอ 30 วิ - 2 นาทีเว็บจะอัพเดต');
    updatePublishButton();
    updateUnpublishedBanner();
  } catch (e) {
    console.error(e);
    let msg = e.message || 'ไม่ทราบสาเหตุ';
    if (msg.includes('401') || msg.toLowerCase().includes('bad credentials')) {
      msg = 'Token ไม่ถูกต้องหรือหมดอายุ — กรุณาตั้งค่าใหม่';
      showGithubSetup();
    } else if (msg.includes('404')) {
      msg = 'ไม่พบไฟล์ data.json บน GitHub — เช็กชื่อ repo/branch';
    }
    alert('❌ Publish ไม่สำเร็จ:\n\n' + msg);
  } finally {
    if (btn) { btn.disabled = false; updatePublishButton(); }
  }
}

function updatePublishButton() {
  const btn = document.getElementById('publishBtn');
  if (!btn) return;
  const dirty = localStorage.getItem(DATA_DIRTY_KEY) === '1';
  const hasToken = !!getGhToken();
  if (!hasToken) {
    btn.innerHTML = '⚙️ ตั้งค่า GitHub Token';
    btn.className = 'btn btn-publish-setup';
  } else if (dirty) {
    btn.innerHTML = '🚀 Publish ขึ้น GitHub';
    btn.className = 'btn btn-publish-ready';
  } else {
    btn.innerHTML = '✅ ตรงกับ GitHub แล้ว';
    btn.className = 'btn btn-publish-clean';
  }
}

function formatThaiDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const buddhistYear = d.getFullYear() + 543;
    return `${d.getDate()} ${months[d.getMonth()]} ${buddhistYear}`;
  } catch { return dateStr; }
}

function countAllSolutions() {
  let total = 0;
  function walk(nodes) {
    for (const n of nodes) {
      if (isSolutionNode(n)) total++;
      if (n.children) walk(n.children);
    }
  }
  for (const b of appData.brands) walk(b.nodes);
  return total;
}

  const branding = appData.branding || {};
  const author = branding.author || {};

  // Inject print header at top of printableSolution
  const article = document.getElementById('printableSolution');
  if (!article) return;
  let printHeader = document.getElementById('printHeader');
  if (printHeader) printHeader.remove();
  printHeader = document.createElement('div');
  printHeader.id = 'printHeader';
  printHeader.className = 'print-only print-header';
  printHeader.innerHTML = `
    <div class="print-header-top">

      const pf = document.getElementById('printFooter');
      if (ph) ph.remove();
      if (pf) pf.remove();

/* ============== HELPERS ============== */
function findBrand(id) { return appData.brands.find(b => b.id === id); }
function findNodeByPath(brand, path) {
  let nodes = brand.nodes;
  let current = null;
  for (const id of path) {
    current = nodes.find(n => n.id === id);
    if (!current) return null;
    nodes = current.children || [];
  }
  return current;
}
function getNodesAtPath(brand, path) {
  let nodes = brand.nodes;
  for (const id of path) {
    const found = nodes.find(n => n.id === id);
    if (!found) return [];
    nodes = found.children || [];
  }
  return nodes;
}
function isSolutionNode(node) {
  return node && node.solution && (!node.children || node.children.length === 0);
}
function genId(prefix='node') { return prefix + '-' + Math.random().toString(36).slice(2, 8); }
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function toast(msg) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(() => root.innerHTML = '', 2400);
}

// Find node + brand by node id (for hotspot links)
function findNodeAndBrandById(nodeId) {
  for (const brand of appData.brands) {
    const result = searchInBrand(brand, nodeId);
    if (result) return { brand, ...result };
  }
  return null;
}
function searchInBrand(brand, nodeId, path = []) {
  function walk(nodes, p) {
    for (const n of nodes) {
      const np = [...p, n.id];
      if (n.id === nodeId) return { node: n, path: np };
      if (n.children) {
        const r = walk(n.children, np);
        if (r) return r;
      }
    }
    return null;
  }
  return walk(brand.nodes, path);
}

/* ============== NAVIGATION (with history) ============== */
const historyStack = [];

function pushHistory() {
  // Snapshot current state before changing
  historyStack.push(JSON.parse(JSON.stringify(viewState)));
  if (historyStack.length > 50) historyStack.shift();
}

function goBack() {
  if (historyStack.length === 0) return navigateHome();
  const prev = historyStack.pop();
  viewState = prev;
  // Restore search input value if back to search mode
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.value = prev.mode === 'search' ? prev.searchQuery : '';
    document.getElementById('searchBox').classList.toggle('has-value', !!searchInput.value);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateHome() {
  pushHistory();
  viewState = { mode: 'home', brandId: null, path: [], searchQuery: '', searchBrandFilter: 'all', diagramId: null, brandTab: 'cm' };
  document.getElementById('searchInput').value = '';
  document.getElementById('searchBox').classList.remove('has-value');
  render();
}
function navigateBrand(brandId, path=[]) {
  pushHistory();
  viewState = { mode: 'brand', brandId, path, searchQuery: '', searchBrandFilter: 'all', diagramId: null, brandTab: viewState.brandTab || 'cm' };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
/* ============== BOOKMARKS & RECENT ============== */
const BOOKMARKS_KEY = 'repairManualBookmarks';
const RECENT_KEY = 'repairManualRecent';
const SEARCH_HISTORY_KEY = 'repairManualSearchHistory';

function getBookmarks() {
  try { return JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '[]'); }
  catch { return []; }
}
function saveBookmarks(arr) {
  localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(arr));
}
function isBookmarked(brandId, nodeId) {
  return getBookmarks().some(b => b.brandId === brandId && b.nodeId === nodeId);
}
function toggleBookmark(brandId, nodeId) {
  const bookmarks = getBookmarks();
  const idx = bookmarks.findIndex(b => b.brandId === brandId && b.nodeId === nodeId);
  if (idx >= 0) {
    bookmarks.splice(idx, 1);
    saveBookmarks(bookmarks);
    toast('🗑 ลบ Bookmark แล้ว');
  } else {
    bookmarks.push({ brandId, nodeId, addedAt: Date.now() });
    saveBookmarks(bookmarks);
    toast('⭐ ปักหมุดแล้ว');
  }
  render();
}
function getBookmarkedNodes() {
  const bookmarks = getBookmarks();
  const result = [];
  for (const bm of bookmarks) {
    const found = findNodeAndBrandById(bm.nodeId);
    if (found && found.brand.id === bm.brandId) {
      result.push({ ...found, addedAt: bm.addedAt });
    }
  }
  return result.sort((a, b) => b.addedAt - a.addedAt);
}

/* Recent History */
function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); }
  catch { return []; }
}
function saveRecent(arr) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(arr));
}
function addToRecent(brandId, nodeId) {
  let recent = getRecent();
  // Remove existing entry
  recent = recent.filter(r => !(r.brandId === brandId && r.nodeId === nodeId));
  // Add to front
  recent.unshift({ brandId, nodeId, viewedAt: Date.now() });
  // Keep only last 10
  recent = recent.slice(0, 10);
  saveRecent(recent);
}
function getRecentNodes() {
  const recent = getRecent();
  const result = [];
  for (const r of recent) {
    const found = findNodeAndBrandById(r.nodeId);
    if (found && found.brand.id === r.brandId) {
      result.push({ ...found, viewedAt: r.viewedAt });
    }
  }
  return result;
}
function clearRecent() {
  if (!confirm('ลบประวัติการเข้าชมทั้งหมด?')) return;
  localStorage.removeItem(RECENT_KEY);
  toast('ลบประวัติแล้ว');
  render();
}

/* Search History (for suggestions) */
function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function addToSearchHistory(query) {
  if (!query || query.length < 2) return;
  let history = getSearchHistory();
  history = history.filter(h => h !== query);
  history.unshift(query);
  history = history.slice(0, 10);
  localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
}


function navigateInto(nodeId) {
  pushHistory();
  const brand = findBrand(viewState.brandId);
  if (!brand) return;
  const newPath = [...viewState.path, nodeId];
  const node = findNodeByPath(brand, newPath);
  viewState.mode = isSolutionNode(node) ? 'solution' : 'brand';
  viewState.path = newPath;
  // Reset stepper state when entering a new solution
  viewState.stepperIdx = 0;
  viewState.solutionViewMode = undefined;
  // Track recent solutions only
  if (node && isSolutionNode(node)) {
    addToRecent(brand.id, node.id);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateBreadcrumb(level) {
  pushHistory();
  if (level === -1) {
    viewState.mode = 'brand';
    viewState.path = [];
  } else {
    viewState.mode = 'brand';
    viewState.path = viewState.path.slice(0, level+1);
    const brand = findBrand(viewState.brandId);
    const node = findNodeByPath(brand, viewState.path);
    if (isSolutionNode(node)) viewState.mode = 'solution';
    else viewState.path = viewState.path.slice(0, -1);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateDiagram(brandId, diagramId) {
  pushHistory();
  viewState = { mode: 'diagram', brandId, path: [], searchQuery: '', searchBrandFilter: 'all', diagramId, brandTab: 'diagrams' };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navigateToNode(brandId, path) {
  pushHistory();
  const brand = findBrand(brandId);
  if (!brand) return;
  const node = findNodeByPath(brand, path);
  viewState.mode = isSolutionNode(node) ? 'solution' : 'brand';
  viewState.brandId = brandId;
  viewState.path = path;
  viewState.stepperIdx = 0;
  viewState.solutionViewMode = undefined;
  // Track recent solutions only
  if (node && isSolutionNode(node)) {
    addToRecent(brandId, node.id);
  }
  document.getElementById('searchInput').value = '';
  document.getElementById('searchBox').classList.remove('has-value');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchBrandTab(tab) {
  viewState.brandTab = tab;

}

function setSearchBrandFilter(filter) {
  viewState.searchBrandFilter = filter;

}

function render() {

  const adminIcon = document.getElementById('adminIcon');
  if (adminIcon) {
    adminIcon.textContent = isAdminUnlocked() ? '🔓' : '🔒';
  }

  // Show Publish controls only when admin is unlocked

  const pubBtn = document.getElementById('publishBtn');

  if (pubBtn) pubBtn.style.display = isAdmin ? 'inline-flex' : 'none';
  if (pubSetBtn) pubSetBtn.style.display = isAdmin ? 'inline-flex' : 'none';
  if (isAdmin) updatePublishButton();

  updateUnpublishedBanner();

  const main = document.getElementById('mainView');
  if (viewState.mode === 'admin') return renderAdmin(main);
  if (viewState.mode === 'search') return renderSearch(main);

  if (viewState.mode === 'brand') return renderBrand(main);

}

function updateUnpublishedBanner() {
  const banner = document.getElementById('unpublishedBanner');

  const isDismissed = sessionStorage.getItem('publishBannerDismissed') === 'true';

  banner.style.display = (hasChanges && isAdmin && !isDismissed) ? 'block' : 'none';

function dismissUnpublishedBanner() {

}

function goToPublish() {

function countNodes(brand) {
  let total = 0, solutions = 0;
  function walk(nodes) {
    for (const n of nodes) {
      total++;
      if (isSolutionNode(n)) solutions++;
      if (n.children) walk(n.children);
    }
  }
  walk(brand.nodes);
  return { topCount: brand.nodes.length, solutionCount: solutions, totalCount: total };
}

// Helper: count solution nodes within a single node tree
function countNodesIn(node) {
  let count = 0;
  if (isSolutionNode(node)) count++;
  if (node.children) {
    for (const child of node.children) count += countNodesIn(child);
  }
  return count;
}

function formatRelativeTime(timestamp) {
  const diff = Date.now() - timestamp;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);
  if (min < 1) return 'เมื่อสักครู่';
  if (min < 60) return `${min} นาทีที่แล้ว`;
  if (hr < 24) return `${hr} ชม.ที่แล้ว`;
  if (day < 7) return `${day} วันที่แล้ว`;
  return formatThaiDate(new Date(timestamp).toISOString().slice(0, 10));
}

function collectByTaskType(brand, taskType) {
  const items = [];
  function walk(nodes, ancestors = []) {
    for (const n of nodes) {
      const path = [...ancestors, n.id];
      if (isSolutionNode(n) && n.taskType === taskType) {
        items.push({ node: n, path });
      }
      if (n.children) walk(n.children, path);
    }
  }
  walk(brand.nodes);
  return items;
}

function countTaskTypes(brand) {
  const counts = { CM: 0, PM: 0, Repair: 0 };
  function walk(nodes) {
    for (const n of nodes) {
      if (isSolutionNode(n) && n.taskType && counts[n.taskType] !== undefined) {
        counts[n.taskType]++;
      }
      if (n.children) walk(n.children);
    }
  }
  walk(brand.nodes);
  return counts;
}

function collectTopItems(brand) {
  const items = [];
  function walk(nodes, ancestors = []) {
    for (const n of nodes) {
      const path = [...ancestors, n.id];
      if (isSolutionNode(n) && n.isTop) {
        items.push({ node: n, path });
      }
      if (n.children) walk(n.children, path);
    }
  }
  walk(brand.nodes);
  return items;
}

function renderSolutionStepper(steps, currentIdx) {
  const totalSteps = steps.length;
  const idx = Math.max(0, Math.min(currentIdx, totalSteps - 1));
  const step = steps[idx];
  const stepText = typeof step === 'string' ? step : (step.text || '');
  const stepImage = typeof step === 'string' ? '' : (step.image || '');
  const isFirst = idx === 0;
  const isLast = idx === totalSteps - 1;

  return `
    <section class="stepper-container">
      <div class="stepper-progress">
        ${steps.map((_, i) => `
          <button class="stepper-dot ${i < idx ? 'done' : ''} ${i === idx ? 'current' : ''}"
                  onclick="gotoStep(${i})"
                  title="ขั้นที่ ${i+1}">
            ${i < idx ? '✓' : i + 1}
          </button>
          ${i < totalSteps - 1 ? `<div class="stepper-line ${i < idx ? 'done' : ''}"></div>` : ''}
        `).join('')}
      </div>

      <div class="stepper-current-info">
        <span class="stepper-counter">ขั้นที่ ${idx + 1} จาก ${totalSteps}</span>
      </div>

      <div class="stepper-card">
        ${stepImage ? `
          <div class="stepper-image" onclick="openLightbox('${escapeHtml(stepImage).replace(/'/g, "\\'")}')">
            <img src="${escapeHtml(stepImage)}" alt="" onerror="this.parentElement.style.display='none'">
            <div class="stepper-image-zoom">🔍 คลิกเพื่อขยาย</div>
          </div>
        ` : ''}
        <div class="stepper-text">
          <div class="stepper-num">${idx + 1}</div>
          <div class="stepper-content">${escapeHtml(stepText) || '<em style="color: var(--ink-muted);">(ไม่มีคำอธิบาย)</em>'}</div>
        </div>
      </div>

      <div class="stepper-actions">
        <button class="btn ${isFirst ? 'btn-disabled' : ''}" onclick="prevStep()" ${isFirst ? 'disabled' : ''}>
          ← ก่อนหน้า
        </button>
        <div class="stepper-progress-text">
          <span class="stepper-progress-bar">
            <span class="stepper-progress-fill" style="width: ${((idx + 1) / totalSteps) * 100}%;"></span>
          </span>
        </div>
        ${isLast
          ? `<button class="btn btn-success" onclick="finishStepper()">✓ เสร็จสิ้น</button>`
          : `<button class="btn btn-primary" onclick="nextStep()">ถัดไป →</button>`
        }
      </div>
    </section>
  `;
}

function renderSolutionStepsAll(steps) {
  return `
    <ol class="step-list">${steps.map(s => {
      const stepText = typeof s === 'string' ? s : (s.text || '');
      const stepImage = typeof s === 'string' ? '' : (s.image || '');
      return `<li>
        ${stepImage ? `
          <div class="step-image" onclick="openLightbox('${escapeHtml(stepImage).replace(/'/g, "\\'")}')">
            <img src="${escapeHtml(stepImage)}" alt="" onerror="this.parentElement.style.display='none'">

        <div class="step-text">${escapeHtml(stepText)}</div>

    }).join('')}</ol>
  `;
}

function setSolutionViewMode(mode) {

function gotoStep(i) {

function prevStep() {

  const hasArrow = h.targetX !== undefined && h.targetY !== undefined && h.targetX !== null && h.targetY !== null;
  const label = h.label || `จุดที่ ${idx + 1}`;

  // Build arrow SVG if target is defined
  let arrowSvg = '';
  if (hasArrow) {
    const arrowId = `arrow-${brandId}-${idx}`;
    arrowSvg = `
      <svg class="hotspot-arrow-svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="left: 0; top: 0; width: 100%; height: 100%;">
        <defs>
          <marker id="${arrowId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"/>
          </marker>
        </defs>
        <line x1="${h.x}" y1="${h.y}" x2="${h.targetX}" y2="${h.targetY}"
              stroke="${color}" stroke-width="0.6"
              stroke-linecap="round"
              marker-end="url(#${arrowId})"
              style="filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));"/>
      </svg>
    `;
  }

  // Target dot (small circle at the arrow tip)
  let targetDot = '';
  if (hasArrow) {
    targetDot = `<div class="hotspot-target" style="left: ${h.targetX}%; top: ${h.targetY}%; --hotspot-color: ${color};"></div>`;
  }

  return `
    ${arrowSvg}
    ${targetDot}
    <div class="hotspot hotspot-compact" style="left: ${h.x}%; top: ${h.y}%; --hotspot-color: ${color};" onclick="${onclick}">
      <div class="hotspot-num-badge">${idx + 1}</div>
      <div class="hotspot-label">${escapeHtml(label)}</div>
    </div>
  `;
}

function handleSearch(e) {

  document.getElementById('searchBox').classList.toggle('has-value', q.length > 0);

  }

}
function clearSearch() {

  document.getElementById('searchBox').classList.remove('has-value');
  if (viewState.mode === 'search') navigateHome();
}

function searchNodes(query, brandFilter = 'all') {
  const q = query.toLowerCase();
  const results = [];
  function walk(brand, nodes, path = []) {
    for (const n of nodes) {
      const newPath = [...path, n.id];
      const matches = [];
      if (n.title && n.title.toLowerCase().includes(q)) matches.push({ field: 'title', text: n.title });
      if (n.description && n.description.toLowerCase().includes(q)) matches.push({ field: 'description', text: n.description });
      if (n.solution) {
        for (const s of (n.solution.symptoms || [])) {
          if (s.toLowerCase().includes(q)) matches.push({ field: 'symptom', text: s });
        }
        for (const t of (n.solution.tools || [])) {
          if (t.toLowerCase().includes(q)) matches.push({ field: 'tool', text: t });
        }
        for (const step of (n.solution.steps || [])) {
          // Support both old format (string) and new format ({text, image})
          const stepText = typeof step === 'string' ? step : (step && step.text) || '';
          if (stepText && stepText.toLowerCase().includes(q)) matches.push({ field: 'step', text: stepText });
        }
        if (n.solution.warning && n.solution.warning.toLowerCase().includes(q)) matches.push({ field: 'warning', text: n.solution.warning });
      }
      if (matches.length > 0) {
        results.push({ brand, node: n, path: newPath, matches });
      }
      if (n.children) walk(brand, n.children, newPath);
    }
  }
  for (const b of appData.brands) {
    if (brandFilter !== 'all' && b.id !== brandFilter) continue;
    walk(b, b.nodes);
  }
  return results;
}

function highlight(text, query) {
  if (!text) return '';
  const escaped = escapeHtml(text);
  if (!query) return escaped;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

const FIELD_LABELS = {
  title: 'ชื่อ', description: 'คำอธิบาย', symptom: 'อาการ',
  tool: 'เครื่องมือ', step: 'ขั้นตอน', warning: 'คำเตือน'
};

function renderSearch(root) {
  const q = viewState.searchQuery;
  const brandFilter = viewState.searchBrandFilter || 'all';
  const allResults = searchNodes(q, 'all');
  const results = brandFilter === 'all' ? allResults : allResults.filter(r => r.brand.id === brandFilter);

  // Count per brand for filter pills
  const counts = { all: allResults.length };
  for (const b of appData.brands) {
    counts[b.id] = allResults.filter(r => r.brand.id === b.id).length;
  }

  // Group by brand (only when showing all)
  const byBrand = {};
  for (const r of results) {
    const k = r.brand.id;
    if (!byBrand[k]) byBrand[k] = { brand: r.brand, items: [] };
    byBrand[k].items.push(r);
  }

  root.innerHTML = `
    ${renderBackBar(null)}
    <div class="level-header">
      <div class="level-header-left">
        <div class="level-tag"><span class="dot"></span> ผลการค้นหา</div>
        <h2>"${escapeHtml(q)}"</h2>
        <p class="search-results-meta">พบ <strong>${results.length}</strong> รายการ</p>
      </div>
    </div>

    <div class="filter-pills">
      <button class="filter-pill ${brandFilter === 'all' ? 'active' : ''}" onclick="setSearchBrandFilter('all')">
        ทุกแบรนด์ <span class="filter-count">${counts.all}</span>
      </button>
      ${appData.brands.map(b => `
        <button class="filter-pill ${brandFilter === b.id ? 'active' : ''}" onclick="setSearchBrandFilter('${b.id}')" style="--filter-color: ${b.color};">
          <span class="filter-dot" style="background: ${b.color};"></span>
          ${escapeHtml(b.name)} <span class="filter-count">${counts[b.id] || 0}</span>
        </button>
      `).join('')}
    </div>

    ${results.length === 0
      ? renderEmpty('ไม่พบผลลัพธ์', 'ลองค้นหาด้วยคำอื่น เช่น เลข Error Code (201, 27), ชื่อชิ้นส่วน (เซ็นเซอร์, มอเตอร์), หรืออาการ (timeout, overload)')
      : Object.values(byBrand).map(group => `
        <div class="search-section-title">${escapeHtml(group.brand.name)} · ${escapeHtml(group.brand.fullName)} (${group.items.length})</div>
        <div class="search-results">
          ${group.items.map(r => {
            const pathLabels = [];
            let nodes = r.brand.nodes;
            for (const id of r.path) {
              const found = nodes.find(n => n.id === id);
              if (!found) break;
              pathLabels.push(found.title);
              nodes = found.children || [];
            }
            const nonTitleMatch = r.matches.find(m => m.field !== 'title') || r.matches[0];
            const fieldsHit = [...new Set(r.matches.map(m => m.field))];
            return `
              <div class="search-result-item" onclick="navigateToNode('${r.brand.id}', ${JSON.stringify(r.path).replace(/"/g,'&quot;')})">
                <div class="search-result-path">${escapeHtml(r.brand.name)} / ${pathLabels.slice(0, -1).map(escapeHtml).join(' / ')}</div>
                <div class="search-result-title">${highlight(r.node.title, q)}</div>
                ${r.node.description ? `<div class="search-result-desc">${highlight(r.node.description, q)}</div>` : ''}
                ${nonTitleMatch && nonTitleMatch.field !== 'title' && nonTitleMatch.field !== 'description'
                  ? `<div class="search-result-snippet">${FIELD_LABELS[nonTitleMatch.field]}: ${highlight(nonTitleMatch.text, q)}</div>`
                  : ''}
                <div class="search-result-tags">
                  ${fieldsHit.map(f => `<span class="result-tag">match: ${FIELD_LABELS[f]}</span>`).join('')}
                  ${isSolutionNode(r.node) ? '<span class="result-tag" style="color: var(--accent-success); border-color: var(--accent-success);">solution</span>' : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `).join('')
    }
  `;
}

function renderTreeNode(brandId, node, parentPath) {

  const expanded = treeExpanded.has(brandId + ':' + path.join('/'));
  return `

      <div class="tree-row ${isSol ? 'is-solution' : ''}">
        ${hasChildren
          ? `<button class="toggle" onclick="toggleTreeNode('${brandId}', '${path.join('/')}'); event.stopPropagation();">${expanded ? '▾' : '▸'}</button>`
          : `<span class="toggle"></span>`}
        <span class="name" onclick="openNodeEdit('${brandId}', '${parentPath.join('/')}', '${node.id}')">${escapeHtml(node.title)}</span>
        <div class="actions">
          ${!isSol ? `<button onclick="openNodeEdit('${brandId}', '${path.join('/')}', null)" title="เพิ่มย่อย">+</button>` : ''}
          <button onclick="openNodeEdit('${brandId}', '${parentPath.join('/')}', '${node.id}')" title="แก้ไข">✎</button>
          <button onclick="deleteNode('${brandId}', '${path.join('/')}')" title="ลบ">×</button>
        </div>
      </div>
      ${expanded && hasChildren ? node.children.map(c => renderTreeNode(brandId, c, path)).join('') : ''}
    </div>
  `;
}

    : '<p style="color: var(--ink-muted);">ยังไม่มีรูป</p>';
}

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    if (!confirm(`ไฟล์ขนาด ${(file.size/1024/1024).toFixed(1)} MB ใหญ่ - อาจทำให้ localStorage เต็ม\nต้องการดำเนินการต่อหรือไม่?`)) return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    diagramEditState.imageData = ev.target.result;
    document.getElementById('diagramImageInput').innerHTML = renderDiagramImageInput();
    toast('โหลดรูปแล้ว');
  };
  reader.readAsDataURL(file);
}

function deleteDiagram(brandId, diagramId) {
  if (!confirm('ลบไดอะแกรมนี้พร้อม Hotspot ทั้งหมด?')) return;
  const brand = findBrand(brandId);
  if (!brand) return;
  brand.diagrams = (brand.diagrams || []).filter(d => d.id !== diagramId);
  saveData();
  toast('ลบแล้ว');
  render();
}

/* === Hotspot Editor === */
let hotspotEditState = { brandId: null, diagramId: null, editingIdx: null, isDragging: false };

function openHotspotEditor(brandId, diagramId) {
  hotspotEditState = { brandId, diagramId, editingIdx: null, isDragging: false };
  renderHotspotEditor();
}

function getEditingDiagram() {
  const brand = findBrand(hotspotEditState.brandId);
  if (!brand) return null;
  return (brand.diagrams || []).find(x => x.id === hotspotEditState.diagramId);
}

function renderHotspotEditor() {
  const d = getEditingDiagram();
  if (!d) { closeModal(); return; }
  const brand = findBrand(hotspotEditState.brandId);

  // Build select options of all leaf nodes
  const allNodes = [];
  for (const b of appData.brands) {
    function walk(nodes, ancestors = []) {
      for (const n of nodes) {
        const path = [...ancestors, n.title];
        if (isSolutionNode(n)) {
          allNodes.push({ id: n.id, brand: b.name, label: b.name + ' / ' + path.join(' / ') });
        }
        if (n.children) walk(n.children, path);
      }
    }
    walk(b.nodes);
  }

  showModal({
    title: `Hotspot: ${d.title} (${brand.name})`,
    wide: true,
    body: `
      <div class="hotspot-editor-help">
        <div style="display: flex; gap: 12px; align-items: flex-start;">
          <div style="font-size: 24px;">💡</div>
          <div style="flex: 1; font-size: 13px; line-height: 1.7;">
            <strong>วิธีใช้:</strong>
            <ol style="margin: 6px 0 0 18px; padding: 0;">
              <li><strong>คลิกบนรูป</strong> → สร้างจุดใหม่พร้อมป้ายชื่อ</li>
              <li><strong>ตั้งชื่อจุด</strong> ในกล่องด้านขวา → ป้ายจะอัพเดตทันที</li>
              <li><strong>กด ➕ เพิ่มลูกศร</strong> → ปลายลูกศรจะปรากฏใกล้จุด <em>(ลากปรับได้)</em></li>
              <li><strong>ลาก:</strong> ป้ายชื่อ = ขยับตำแหน่ง · จุดเล็กบนรูป = ปรับปลายลูกศร</li>
              <li><strong>เลือก Error Code</strong> ที่จะลิงก์ไป → กด <strong>เสร็จสิ้น</strong></li>
            </ol>
          </div>
        </div>
      </div>

      <div class="hotspot-editor-grid">
        <div>
          <div class="diagram-img-wrap editing" id="editorImgWrap" onclick="handleDiagramClick(event)">
            <img src="${d.image}" id="editorImg">

            <!-- Arrows SVG layer -->
            ${(() => {
              const arrows = (d.hotspots || []).map((h, i) => {
                if (h.targetX === undefined || h.targetY === undefined) return '';
                return `
                  <line x1="${h.x}" y1="${h.y}" x2="${h.targetX}" y2="${h.targetY}"
                        stroke="${brand.color}" stroke-width="0.6" stroke-linecap="round"
                        marker-end="url(#editor-arrow-${i})"/>
                `;
              }).filter(Boolean).join('');
              const markers = (d.hotspots || []).map((h, i) => {
                if (h.targetX === undefined || h.targetY === undefined) return '';
                return `<marker id="editor-arrow-${i}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="${brand.color}"/></marker>`;
              }).filter(Boolean).join('');
              return arrows ? `<svg class="hotspot-arrow-svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="left: 0; top: 0; width: 100%; height: 100%;"><defs>${markers}</defs>${arrows}</svg>` : '';
            })()}

            <!-- Target dots (draggable) -->
            ${(d.hotspots || []).map((h, i) => {
              if (h.targetX === undefined || h.targetY === undefined) return '';
              return `<div class="hotspot-target editor-target ${hotspotEditState.editingIdx === i ? 'editor-target-active' : ''}"
                          data-target-idx="${i}"
                          style="left: ${h.targetX}%; top: ${h.targetY}%; --hotspot-color: ${brand.color}; cursor: move; pointer-events: auto;"
                          onmousedown="startDragArrowTarget(event, ${i})"
                          ontouchstart="startDragArrowTarget(event, ${i})"
                          title="ลากเพื่อปรับปลายลูกศร"></div>`;
            }).join('')}

            <!-- Hotspot compact (badge + label) -->
            ${(d.hotspots || []).map((h, i) => `
              <div class="hotspot hotspot-compact ${hotspotEditState.editingIdx === i ? 'editing-active' : ''}"
                   data-hotspot-idx="${i}"
                   style="left: ${h.x}%; top: ${h.y}%; --hotspot-color: ${brand.color};"
                   onmousedown="startDragHotspot(event, ${i})"
                   ontouchstart="startDragHotspot(event, ${i})"
                   onclick="event.stopPropagation(); editHotspot(${i})">
                <div class="hotspot-num-badge">${i+1}</div>
                <div class="hotspot-label">${escapeHtml(h.label || `จุดที่ ${i+1}`)}</div>
              </div>
              <button class="hotspot-delete-btn-overlay"
                      data-delete-for="${i}"
                      style="left: calc(${h.x}% + 8px); top: calc(${h.y}% - 22px);"
                      onmousedown="event.stopPropagation(); event.preventDefault();"
                      ontouchstart="event.stopPropagation(); event.preventDefault();"
                      onclick="event.stopPropagation(); event.preventDefault(); removeHotspot(${i}, event); return false;"
                      title="ลบจุดที่ ${i+1}">×</button>
            `).join('')}
          </div>
        </div>
        <div class="hotspot-list-panel">
          <h4>รายการ Hotspot (${(d.hotspots || []).length})</h4>
          <div class="hotspot-list-scroll">
            ${(d.hotspots || []).length === 0 ? '<p style="font-size: 13px; color: var(--ink-muted); padding: 12px; text-align: center;">👆 คลิกบนรูปเพื่อเพิ่มจุดแรก</p>' : (d.hotspots || []).map((h, i) => {
              const hasArrow = h.targetX !== undefined && h.targetY !== undefined;
              return `
                <div class="hotspot-edit-item ${hotspotEditState.editingIdx === i ? 'active' : ''}">
                  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                    <div class="hotspot-list-num" style="background: ${brand.color};">${i+1}</div>
                    <input type="text" placeholder="ชื่อจุด เช่น เซ็นเซอร์ลิมิตบน" value="${escapeHtml(h.label || '')}" style="flex: 1; padding: 5px 8px; font-size: 12px;" oninput="updateHotspotField(${i}, 'label', this.value); refreshHotspotLabel(${i})" onfocus="hotspotEditState.editingIdx = ${i}; refreshHotspotMarkers()">
                    <button class="btn btn-sm btn-danger" onclick="removeHotspot(${i}, event)" onmousedown="event.stopPropagation()" style="padding: 3px 7px; flex-shrink: 0;" title="ลบจุดนี้">×</button>
                  </div>
                  <div style="display: flex; gap: 4px; margin-bottom: 6px;">
                    <button class="btn btn-sm ${hasArrow ? 'btn-primary' : ''}" onclick="toggleHotspotArrow(${i})" style="font-size: 11px; padding: 4px 8px; flex: 1;" title="${hasArrow ? 'ลบลูกศร' : 'เพิ่มลูกศร'}">
                      ${hasArrow ? '✓ มีลูกศร — กดเพื่อลบ' : '➕ เพิ่มลูกศร'}
                    </button>
                  </div>
                  ${hasArrow ? `<div style="font-size: 10px; color: var(--ink-muted); padding: 0 4px 6px; line-height: 1.4;">💡 ลากจุดเล็กๆ บนรูปเพื่อปรับปลายลูกศร</div>` : ''}
                  <select style="width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid var(--line); border-radius: var(--radius);" onchange="updateHotspotField(${i}, 'linkNodeId', this.value)">
                    <option value="">— ยังไม่ได้เลือก Error Code —</option>
                    ${allNodes.map(n => `<option value="${n.id}" ${h.linkNodeId === n.id ? 'selected' : ''}>${escapeHtml(n.label)}</option>`).join('')}
                  </select>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `,
    onSave: () => {
      saveData();
      toast(`บันทึก ${(d.hotspots || []).length} Hotspot แล้ว`);
      render();
      return true;
    },
    saveLabel: 'เสร็จสิ้น'
  });
}

function refreshHotspotLabel(i) {
  // Update the label text on the badge in real-time as user types
  const wrap = document.getElementById('editorImgWrap');
  if (!wrap) return;
  const hotspots = wrap.querySelectorAll('.hotspot[data-hotspot-idx]');
  const d = getEditingDiagram();
  if (hotspots[i] && d && d.hotspots[i]) {
    const labelEl = hotspots[i].querySelector('.hotspot-label');
    if (labelEl) labelEl.textContent = d.hotspots[i].label || `จุดที่ ${i+1}`;
  }
}

function toggleHotspotArrow(i) {
  const d = getEditingDiagram();
  if (!d || !d.hotspots[i]) return;
  const h = d.hotspots[i];
  if (h.targetX !== undefined && h.targetY !== undefined) {
    // Remove arrow
    delete h.targetX;
    delete h.targetY;
  } else {
    // Add arrow - default position 8 units right + 8 units down from hotspot
    h.targetX = Math.min(95, Math.max(5, h.x + 8));
    h.targetY = Math.min(95, Math.max(5, h.y + 8));
  }
  saveData();
  hotspotEditState.editingIdx = i;
  renderHotspotEditor();
}

function startDragArrowTarget(event, idx) {
  event.preventDefault();
  event.stopPropagation();
  hotspotEditState.editingIdx = idx;
  hotspotEditState.isDragging = false;
  let dragStarted = false;

  const img = document.getElementById('editorImg');
  const rect = img.getBoundingClientRect();

  const moveHandler = (e) => {
    const evt = e.touches ? e.touches[0] : e;
    const x = ((evt.clientX - rect.left) / rect.width) * 100;
    const y = ((evt.clientY - rect.top) / rect.height) * 100;
    if (x < 0 || x > 100 || y < 0 || y > 100) return;
    if (!dragStarted) { dragStarted = true; hotspotEditState.isDragging = true; }
    const d = getEditingDiagram();
    if (!d || !d.hotspots[idx]) return;
    d.hotspots[idx].targetX = Math.round(x * 10) / 10;
    d.hotspots[idx].targetY = Math.round(y * 10) / 10;
    // Update target dot position immediately
    const wrap = document.getElementById('editorImgWrap');
    const target = wrap.querySelector(`[data-target-idx="${idx}"]`);
    if (target) {
      target.style.left = d.hotspots[idx].targetX + '%';
      target.style.top = d.hotspots[idx].targetY + '%';
    }
    // Update SVG line
    const svg = wrap.querySelector('.hotspot-arrow-svg');
    if (svg) {
      const lines = svg.querySelectorAll('line');
      const visibleIdx = Array.from(d.hotspots).filter(h => h.targetX !== undefined).indexOf(d.hotspots[idx]);
      if (lines[visibleIdx]) {
        lines[visibleIdx].setAttribute('x2', d.hotspots[idx].targetX);
        lines[visibleIdx].setAttribute('y2', d.hotspots[idx].targetY);
      }
    }
  };
  const upHandler = () => {
    document.removeEventListener('mousemove', moveHandler);
    document.removeEventListener('mouseup', upHandler);
    document.removeEventListener('touchmove', moveHandler);
    document.removeEventListener('touchend', upHandler);
    setTimeout(() => { hotspotEditState.isDragging = false; }, 50);
    saveData();
  };
  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', upHandler);
  document.addEventListener('touchmove', moveHandler, { passive: false });
  document.addEventListener('touchend', upHandler);
}

function refreshHotspotMarkers() {
  // Highlight the currently editing marker
  const wrap = document.getElementById('editorImgWrap');
  if (!wrap) return;
  const markers = wrap.querySelectorAll('.hotspot');
  markers.forEach((m, i) => {
    m.classList.toggle('editing-active', i === hotspotEditState.editingIdx);
  });
}

function handleDiagramClick(event) {
  if (hotspotEditState.isDragging) {
    hotspotEditState.isDragging = false;
    return;
  }
  const img = document.getElementById('editorImg');
  const rect = img.getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 100;
  const y = ((event.clientY - rect.top) / rect.height) * 100;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;

  const d = getEditingDiagram();
  if (!d) return;
  if (!d.hotspots) d.hotspots = [];
  d.hotspots.push({ x: Math.round(x*10)/10, y: Math.round(y*10)/10, label: '', linkNodeId: '' });
  hotspotEditState.editingIdx = d.hotspots.length - 1;
  renderHotspotEditor();
}

function startDragHotspot(event, idx) {
  event.preventDefault();
  event.stopPropagation();
  hotspotEditState.editingIdx = idx;
  hotspotEditState.isDragging = false;
  let dragStarted = false;

  const img = document.getElementById('editorImg');
  const rect = img.getBoundingClientRect();

  const moveHandler = (e) => {
    const evt = e.touches ? e.touches[0] : e;
    const x = ((evt.clientX - rect.left) / rect.width) * 100;
    const y = ((evt.clientY - rect.top) / rect.height) * 100;
    if (x < 0 || x > 100 || y < 0 || y > 100) return;
    if (!dragStarted) { dragStarted = true; hotspotEditState.isDragging = true; }
    const d = getEditingDiagram();
    if (!d || !d.hotspots[idx]) return;
    d.hotspots[idx].x = Math.round(x * 10) / 10;
    d.hotspots[idx].y = Math.round(y * 10) / 10;
    // Move the badge directly for smooth dragging
    const wrap = document.getElementById('editorImgWrap');
    const markers = wrap.querySelectorAll('.hotspot[data-hotspot-idx]');
    if (markers[idx]) {
      markers[idx].style.left = d.hotspots[idx].x + '%';
      markers[idx].style.top = d.hotspots[idx].y + '%';
    }
    // Update arrow line if exists
    const svg = wrap.querySelector('.hotspot-arrow-svg');
    if (svg && d.hotspots[idx].targetX !== undefined) {
      const lines = svg.querySelectorAll('line');
      const arrowedHotspots = d.hotspots.filter(h => h.targetX !== undefined);
      const visibleIdx = arrowedHotspots.indexOf(d.hotspots[idx]);
      if (lines[visibleIdx]) {
        lines[visibleIdx].setAttribute('x1', d.hotspots[idx].x);
        lines[visibleIdx].setAttribute('y1', d.hotspots[idx].y);
      }
    }
  };
  const upHandler = () => {
    document.removeEventListener('mousemove', moveHandler);
    document.removeEventListener('mouseup', upHandler);
    document.removeEventListener('touchmove', moveHandler);
    document.removeEventListener('touchend', upHandler);
    setTimeout(() => { hotspotEditState.isDragging = false; }, 50);
    saveData();
  };
  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', upHandler);
  document.addEventListener('touchmove', moveHandler, { passive: false });
  document.addEventListener('touchend', upHandler);
}

function editHotspot(idx) {
  hotspotEditState.editingIdx = idx;
  refreshHotspotMarkers();
  // Scroll to the corresponding form item
  const items = document.querySelectorAll('.hotspot-edit-item');
  if (items[idx]) {
    items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    const input = items[idx].querySelector('input');
    if (input) input.focus();
  }
}

function updateHotspotField(idx, field, value) {
  const d = getEditingDiagram();
  if (!d || !d.hotspots[idx]) return;
  d.hotspots[idx][field] = value;
  // Auto-save on each edit so changes persist
  saveData();
}

function removeHotspot(idx, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  if (!confirm(`ลบจุดที่ ${idx+1} ใช่ไหม?`)) return;
  const d = getEditingDiagram();
  if (!d || !d.hotspots) return;
  d.hotspots.splice(idx, 1);
  hotspotEditState.editingIdx = null;
  // Save immediately so deletion persists even if user closes modal
  saveData();
  renderHotspotEditor();
}

/* === Brand Edit === */
function openBrandEdit(brandId) {

function deleteBrand(brandId) {

}

/* === Node Edit === */
let editFormState = { symptoms: [], tools: [], steps: [] };

function openNodeEdit(brandId, parentPathStr, nodeId) {
  const brand = findBrand(brandId);
  if (!brand) return;
  const parentPath = parentPathStr ? parentPathStr.split('/').filter(Boolean) : [];
  let node, isNew = false;
  if (nodeId) node = findNodeByPath(brand, [...parentPath, nodeId]);
  else { isNew = true; node = { id: genId(), title: '', description: '', children: [] }; }
  if (!node) return;

  editFormState = {
    symptoms: node.solution ? [...(node.solution.symptoms || [])] : [],
    tools: node.solution ? [...(node.solution.tools || [])] : [],
    steps: node.solution
      ? (node.solution.steps || []).map(s => typeof s === 'string' ? { text: s, image: '' } : { text: s.text || '', image: s.image || '' })
      : []
  };

  const hasSolution = !!node.solution;
  const hasChildren = node.children && node.children.length > 0;
  const isTopLevel = parentPath.length === 0;

  showModal({
    title: isNew ? 'เพิ่มรายการใหม่' : `แก้ไข: ${node.title}`,
    body: `
      <div class="form-group"><label>ชื่อรายการ</label><input id="nf-title" value="${escapeHtml(node.title)}" placeholder="เช่น 201 - เซ็นเซอร์ลิมิต..."></div>
      <div class="form-group"><label>คำอธิบายสั้น</label><textarea id="nf-desc" style="min-height: 60px;">${escapeHtml(node.description || '')}</textarea></div>
      ${isTopLevel ? `
      <div class="form-group" style="background: var(--brand-disraptor-pale); border: 1px solid var(--brand-disraptor-light); padding: 12px; border-radius: var(--radius);">
        <label>📂 หมวดหมู่ Maintenance Type</label>
        <select id="nf-maintenance-type" style="margin-top: 4px;">
          <option value="CM" ${(node.maintenanceType || 'CM') === 'CM' ? 'selected' : ''}>🔴 CM — Corrective Maintenance (แก้ปัญหาเมื่อเสีย)</option>
          <option value="PM" ${node.maintenanceType === 'PM' ? 'selected' : ''}>🟢 PM — Preventive Maintenance (บำรุงรักษาเชิงป้องกัน)</option>
          <option value="Repair" ${node.maintenanceType === 'Repair' ? 'selected' : ''}>🔵 Repair — งานซ่อมใหญ่ / อะไหล่</option>
        </select>
        <p style="font-size: 11px; color: var(--ink-soft); margin: 6px 0 0;">เลือกหมวดที่รายการนี้จะแสดง — มีผลเฉพาะ category ระดับบนสุด</p>
      </div>` : ''}
      <div class="form-group">
        <label>
          <input type="checkbox" id="nf-issolution" ${hasSolution ? 'checked' : ''} ${hasChildren ? 'disabled' : ''} onchange="toggleSolutionFields()">
          เป็นรายการวิธีแก้ปัญหา (Solution Leaf)
          ${hasChildren ? '<span class="hint">— ลบรายการย่อยก่อน</span>' : ''}
        </label>
      </div>
      <div id="solutionFields" style="${hasSolution ? '' : 'display:none;'} background: var(--bg); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line);">
        <div class="form-group" style="background: var(--brand-disraptor-pale); border: 1px solid var(--brand-disraptor); padding: 12px 14px; border-radius: var(--radius); margin-bottom: 16px;">

      const title = document.getElementById('nf-title').value.trim();
      if (!title) { toast('กรุณาใส่ชื่อ'); return false; }
      const description = document.getElementById('nf-desc').value.trim();
      const isSol = document.getElementById('nf-issolution').checked;
      const taskTypeEl = document.querySelector('input[name="nf-tasktype"]:checked');
      const taskType = taskTypeEl ? taskTypeEl.value : 'Repair';
      const updated = { id: node.id, title, description };
      if (isSol) {
        updated.taskType = taskType;
        updated.solution = {
          difficulty: document.getElementById('nf-difficulty').value,
          estimatedTime: document.getElementById('nf-time').value.trim(),
          warning: document.getElementById('nf-warning').value.trim(),
          symptoms: [...editFormState.symptoms],
          tools: [...editFormState.tools],
          steps: editFormState.steps.map(s => typeof s === 'string' ? { text: s, image: '' } : { text: s.text || '', image: s.image || '' })
        };
      } else {
        updated.children = node.children || [];
      }
      if (isNew) {
        if (parentPath.length === 0) brand.nodes.push(updated);
        else {
          const parent = findNodeByPath(brand, parentPath);
          if (!parent.children) parent.children = [];
          parent.children.push(updated);
        }
      } else {
        Object.keys(node).forEach(k => delete node[k]);
        Object.assign(node, updated);
      }
      saveData(); toast(isNew ? 'เพิ่มแล้ว' : 'บันทึกแล้ว'); render();
      return true;
    }
  });
}

function pillHtml(text, key, idx) {
  return `<span class="pill">${escapeHtml(text)}<button onclick="removePill('${key}', ${idx})">×</button></span>`;
}
function addPillOnEnter(e, key) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  if (!val) return;
  editFormState[key].push(val);
  e.target.value = '';
  refreshPills(key);
}
function removePill(key, idx) {
  editFormState[key].splice(idx, 1);
  refreshPills(key);
}
function refreshPills(key) {
  const container = document.getElementById('pill-' + key);
  container.innerHTML = editFormState[key].map((s, i) => pillHtml(s, key, i)).join('') +
    `<input type="text" placeholder="พิมพ์แล้วกด Enter" onkeydown="addPillOnEnter(event, '${key}')">`;
  container.querySelector('input').focus();
}

function getModalScrollEl() {
  // The element that actually scrolls when the modal is open
  // On desktop: .modal-body. On mobile fullscreen: .modal itself or document
  const modalBody = document.querySelector('.modal-body');
  const modal = document.querySelector('.modal');
  if (modalBody && modalBody.scrollHeight > modalBody.clientHeight) return modalBody;
  if (modal && modal.scrollHeight > modal.clientHeight) return modal;
  return document.documentElement;
}

function saveScroll() {
  const el = getModalScrollEl();
  return { el, top: el.scrollTop };
}

function restoreScroll(saved) {
  if (!saved || !saved.el) return;
  // Use requestAnimationFrame to ensure layout is done
  requestAnimationFrame(() => {
    saved.el.scrollTop = saved.top;
    // Run a second time after micro-tasks to handle async DOM updates
    requestAnimationFrame(() => { saved.el.scrollTop = saved.top; });
  });
}

function refreshStepRow(i) {
  const list = document.getElementById('steps-list');
  if (!list) return;
  const saved = saveScroll();
  const rows = list.querySelectorAll('.step-edit-row');
  if (rows[i]) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = stepRowHtml(editFormState.steps[i], i);
    rows[i].replaceWith(wrapper.firstElementChild);
  }
  restoreScroll(saved);
}

function refreshAllSteps() {
  const list = document.getElementById('steps-list');
  if (!list) return;
  const saved = saveScroll();
  list.innerHTML = editFormState.steps.map((s, i) => stepRowHtml(s, i)).join('');
  restoreScroll(saved);
}

// Renumber visible step rows in-place (without rebuilding HTML) — preserves focus & scroll
function renumberStepRows() {
  const list = document.getElementById('steps-list');
  if (!list) return;
  const rows = list.querySelectorAll('.step-edit-row');
  rows.forEach((row, i) => {
    row.dataset.stepIdx = i;
    // Update the number badge
    const numEl = row.querySelector('.step-num-badge');
    if (numEl) numEl.textContent = i + 1;
    // Update onclick handlers that reference index
    const moveUpBtn = row.querySelector('[data-action="move-up"]');
    const moveDownBtn = row.querySelector('[data-action="move-down"]');
    const removeBtn = row.querySelector('[data-action="remove-step"]');
    const uploadBtn = row.querySelector('[data-action="upload-image"]');
    const urlBtn = row.querySelector('[data-action="toggle-url"]');
    const removeImgBtn = row.querySelector('[data-action="remove-image"]');
    const fileInput = row.querySelector('input[type="file"]');
    const textarea = row.querySelector('textarea');

    if (moveUpBtn) moveUpBtn.onclick = (e) => { e.preventDefault(); moveStep(i, -1); };
    if (moveDownBtn) moveDownBtn.onclick = (e) => { e.preventDefault(); moveStep(i, 1); };
    if (removeBtn) removeBtn.onclick = (e) => { e.preventDefault(); removeStep(i); };
    if (uploadBtn) uploadBtn.onclick = (e) => { e.preventDefault(); fileInput?.click(); };
    if (urlBtn) urlBtn.onclick = (e) => { e.preventDefault(); toggleStepImageUrl(i); };
    if (removeImgBtn) removeImgBtn.onclick = (e) => { e.preventDefault(); removeStepImage(i); };
    if (fileInput) {
      const newId = 'stepImg-' + i;
      fileInput.id = newId;
      fileInput.onchange = (ev) => handleStepUpload(i, ev);
    }
    if (textarea) textarea.oninput = (e) => { editFormState.steps[i].text = e.target.value; };
  });
}

function addStep() {
  editFormState.steps.push({ text: '', image: '' });
  const newIdx = editFormState.steps.length - 1;

  const list = document.getElementById('steps-list');
  if (!list) return;

  const wrapper = document.createElement('div');
  wrapper.innerHTML = stepRowHtml(editFormState.steps[newIdx], newIdx);
  const newRow = wrapper.firstElementChild;
  newRow.style.opacity = '0';
  newRow.style.transform = 'translateY(20px)';
  list.appendChild(newRow);

  // Animate in
  requestAnimationFrame(() => {
    newRow.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    newRow.style.opacity = '1';
    newRow.style.transform = 'translateY(0)';
  });

  // Scroll new row into view WITHIN the modal — not the whole page
  setTimeout(() => {
    const scrollEl = getModalScrollEl();
    if (scrollEl && scrollEl !== document.documentElement) {
      // Calculate the element's position relative to the scroll container
      const rowRect = newRow.getBoundingClientRect();
      const containerRect = scrollEl.getBoundingClientRect();
      const offsetTop = rowRect.top - containerRect.top + scrollEl.scrollTop;
      const targetScroll = offsetTop - (scrollEl.clientHeight / 2) + (rowRect.height / 2);
      scrollEl.scrollTo({ top: Math.max(0, targetScroll), behavior: 'smooth' });
    } else {
      newRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    const ta = newRow.querySelector('textarea');
    if (ta) {
      setTimeout(() => ta.focus({ preventScroll: true }), 350);
    }
  }, 50);
}

function removeStep(i) {
  if (!confirm('ลบขั้นตอนนี้?')) return;

  const list = document.getElementById('steps-list');
  if (!list) return;
  const rows = list.querySelectorAll('.step-edit-row');
  const rowToRemove = rows[i];

  // Splice data first
  editFormState.steps.splice(i, 1);

  if (rowToRemove) {
    // Animate out
    rowToRemove.style.transition = 'all 0.25s ease';
    rowToRemove.style.opacity = '0';
    rowToRemove.style.transform = 'translateX(-20px)';
    rowToRemove.style.maxHeight = rowToRemove.offsetHeight + 'px';

    setTimeout(() => {
      rowToRemove.style.maxHeight = '0';
      rowToRemove.style.padding = '0';
      rowToRemove.style.margin = '0';
      rowToRemove.style.overflow = 'hidden';

      setTimeout(() => {
        rowToRemove.remove();
        // Renumber remaining rows in-place — no full rebuild, no scroll change
        renumberStepRows();
      }, 250);
    }, 100);
  } else {
    refreshAllSteps();
  }
}

function moveStep(i, direction) {
  const j = i + direction;
  if (j < 0 || j >= editFormState.steps.length) return;

  // Swap data
  const tmp = editFormState.steps[i];
  editFormState.steps[i] = editFormState.steps[j];
  editFormState.steps[j] = tmp;

  // Swap DOM nodes physically — no scroll manipulation needed
  const list = document.getElementById('steps-list');
  if (!list) return;
  const rows = list.querySelectorAll('.step-edit-row');
  const rowI = rows[i];
  const rowJ = rows[j];

  if (rowI && rowJ) {
    if (direction > 0) {
      // Move i down: place rowJ before rowI (rowI ends up after rowJ)
      list.insertBefore(rowJ, rowI);
    } else {
      // Move i up: place rowI before rowJ
      list.insertBefore(rowI, rowJ);
    }
    // Renumber in-place WITHOUT rebuilding HTML
    renumberStepRows();
    // Highlight the moved row briefly
    const newRows = list.querySelectorAll('.step-edit-row');
    const moved = newRows[j];
    if (moved) {
      moved.style.transition = 'background 0.6s ease';
      moved.style.background = 'var(--brand-disraptor-pale)';
      setTimeout(() => { moved.style.background = ''; }, 700);
      // Scroll just enough to keep moved row visible (within modal scroll area)
      requestAnimationFrame(() => {
        const scrollEl = getModalScrollEl();
        if (scrollEl && scrollEl !== document.documentElement) {
          const rowRect = moved.getBoundingClientRect();
          const containerRect = scrollEl.getBoundingClientRect();
          // Check if visible WITHIN the modal scroll container (not viewport)
          const isVisible = rowRect.top >= containerRect.top && rowRect.bottom <= containerRect.bottom;
          if (!isVisible) {
            const offsetTop = rowRect.top - containerRect.top + scrollEl.scrollTop;
            const targetScroll = offsetTop - 80; // 80px padding from top
            scrollEl.scrollTo({ top: Math.max(0, targetScroll), behavior: 'smooth' });
          }
        } else {
          const movedRect = moved.getBoundingClientRect();
          const isVisible = movedRect.top >= 0 && movedRect.bottom <= window.innerHeight;
          if (!isVisible) {
            moved.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      });
    }
  }
}

function toggleStepImageUrl(i) {
  const el = document.getElementById('stepUrlInput-' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function removeStepImage(i) {
  if (!editFormState.steps[i]) return;
  editFormState.steps[i].image = '';
  refreshStepRow(i);
}

function handleStepUpload(i, event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    toast('กรุณาเลือกไฟล์รูปภาพ');
    return;
  }
  const sizeMB = file.size / 1024 / 1024;
  if (sizeMB > 3) {
    if (!confirm(`รูปขนาด ${sizeMB.toFixed(1)} MB ใหญ่ — ระบบจะลดขนาดให้อัตโนมัติ\nต้องการดำเนินการต่อ?`)) {
      event.target.value = '';
      return;
    }
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const tempImg = new Image();
    tempImg.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 700;
      let w = tempImg.width, h = tempImg.height;
      if (Math.max(w, h) > maxSize) {
        const ratio = maxSize / Math.max(w, h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(tempImg, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.78);
      if (!editFormState.steps[i]) editFormState.steps[i] = { text: '', image: '' };
      editFormState.steps[i].image = dataUrl;
      refreshStepRow(i);
      toast('โหลดรูปแล้ว ✓');
    };
    tempImg.onerror = () => toast('ไม่สามารถโหลดรูปได้');
    tempImg.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function toggleSolutionFields() { document.getElementById('solutionFields').style.display = document.getElementById('nf-issolution').checked ? '' : 'none'; }

function deleteNode(brandId, pathStr) {
  if (!confirm('ลบรายการนี้และรายการย่อย?')) return;
  const brand = findBrand(brandId);
  const path = pathStr.split('/').filter(Boolean);
  const targetId = path[path.length-1];
  const parentPath = path.slice(0,-1);
  if (parentPath.length === 0) brand.nodes = brand.nodes.filter(n => n.id !== targetId);
  else {
    const parent = findNodeByPath(brand, parentPath);
    if (parent && parent.children) parent.children = parent.children.filter(n => n.id !== targetId);
  }
  saveData(); toast('ลบแล้ว'); render();
}

// 📦 PUBLISH: Generate complete index.html with current data baked in
async function publishWebsite() {
  toast('⏳ กำลังสร้างไฟล์...');

  try {
    // Step 1: Bump version
    if (!appData.branding) appData.branding = {};
    const oldVersion = appData.branding.version || '1.0';
    const newVersion = bumpVersion(oldVersion);
    appData.branding.version = newVersion;
    appData.branding.lastUpdated = new Date().toISOString().slice(0, 10);
    saveData();

    // Step 2: Fetch the current page's HTML
    const currentHtml = document.documentElement.outerHTML;

    // Step 3: Replace DEFAULT_DATA in the HTML with current appData
    const dataStr = JSON.stringify(appData);
    const pattern = /(const DEFAULT_DATA = )(\{[\s\S]*?\});(\s*\n)/;
    const match = currentHtml.match(pattern);

    if (!match) {
      throw new Error('ไม่พบ DEFAULT_DATA ในไฟล์ — กรุณาใช้ Export JSON แทน');
    }

    let newHtml = currentHtml.replace(pattern, `$1${dataStr.replace(/\$/g, '$$$$')};$3`);

    // Step 4: Add DOCTYPE if missing
    if (!newHtml.startsWith('<!DOCTYPE')) {
      newHtml = '<!DOCTYPE html>\n' + newHtml;
    }

    // Step 5: Download as index.html
    const blob = new Blob([newHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'index.html';
    a.click();
    URL.revokeObjectURL(url);

    // Step 6: Mark as published
    localStorage.removeItem('hasUnpublishedChanges');

    // Step 7: Show success modal with next steps
    setTimeout(() => {
      showPublishSuccess(newVersion);
      render(); // Refresh admin to remove the warning banner
    }, 300);

  } catch (e) {
    console.error('Publish error:', e);
    toast('❌ ไม่สามารถสร้างไฟล์ได้: ' + e.message);
  }
}

function bumpVersion(v) {
  // "1.0" → "1.1", "1.9" → "2.0"
  const parts = (v || '1.0').split('.').map(n => parseInt(n) || 0);
  while (parts.length < 2) parts.push(0);
  parts[1]++;
  if (parts[1] >= 10) {
    parts[0]++;
    parts[1] = 0;
  }
  return parts.join('.');
}

function importJSON() {
  try {
    const text = document.getElementById('jsonData').value;
    const parsed = JSON.parse(text);
    if (!parsed.brands || !Array.isArray(parsed.brands)) throw new Error('ต้องมี brands array');
    // Migrate: if data has top-level diagrams, distribute to first brand
    if (parsed.diagrams && parsed.diagrams.length > 0 && parsed.brands.length > 0) {
      if (!parsed.brands[1].diagrams) parsed.brands[1].diagrams = parsed.diagrams;
      delete parsed.diagrams;
    }
    for (const b of parsed.brands) if (!b.diagrams) b.diagrams = [];
    appData = parsed;
    saveData();
    toast('Import สำเร็จ'); render();
  } catch (e) { toast('Import ไม่สำเร็จ: ' + e.message); }
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `repair-manual-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ดาวน์โหลดแล้ว');
}
function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(appData, null, 2))
    .then(() => toast('Copy แล้ว'))
    .catch(() => toast('Copy ไม่สำเร็จ'));
}


function renderAdminReset() {

    let n = 0;
    for (const node of nodes) { n++; if (node.children) n += count(node.children); }
    return n;
  }
  for (const b of DEFAULT_DATA.brands) {
    defaultCount += count(b.nodes);
    defaultDiagrams += (b.diagrams || []).length;
  }
  for (const b of appData.brands) {
    currentCount += count(b.nodes);
    currentDiagrams += (b.diagrams || []).length;

  return `

      </div>
      <div style="background: var(--bg-card); padding: 16px; border-radius: var(--radius); border: 1px solid var(--line);">
        <h4 style="font-size: 15px; font-weight: 600; margin-bottom: 8px;">🔄 โหลดข้อมูลตัวอย่างใหม่ทับ</h4>
        <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 12px;">แทนที่ข้อมูลทั้งหมดด้วยตัวอย่างเริ่มต้นที่ฝังในเว็บ</p>

function modalSave() {

    const ok = modalSaveCallback();
    if (ok !== false) closeModal();
  } else closeModal();
}

/* ============== KEYBOARD SHORTCUTS ============== */
document.addEventListener('keydown', (e) => {
  // Don't trigger when typing in input/textarea
  const tag = e.target.tagName;
  const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable;

  // Ctrl+K or Cmd+K → focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const input = document.getElementById('searchInput');
    if (input) { input.focus(); input.select(); }
    return;
  }
  // / → focus search (only when not typing)
  if (e.key === '/' && !isTyping) {
    e.preventDefault();
    const input = document.getElementById('searchInput');
    if (input) input.focus();
    return;
  }
  // Esc → blur search / close modal
  if (e.key === 'Escape') {
    if (document.activeElement && document.activeElement.id === 'searchInput') {
      document.activeElement.blur();
      if (viewState.mode === 'search') {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchBox').classList.remove('has-value');
        navigateHome();
      }
    }
    return;
  }
  // Arrow keys for stepper navigation (when in solution + stepper mode)
  if (!isTyping && viewState.mode === 'solution' && viewState.solutionViewMode === 'stepper') {
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      nextStep();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      prevStep();
    }
  }
});

  const z = document.getElementById('uploadZone');

});

  const z = document.getElementById('uploadZone');
  if (z && z.contains(e.target)) {
    e.preventDefault();
    z.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        diagramEditState.imageData = ev.target.result;
        document.getElementById('diagramImageInput').innerHTML = renderDiagramImageInput();
        toast('โหลดรูปแล้ว');

      reader.readAsDataURL(file);
    }
  }
});
